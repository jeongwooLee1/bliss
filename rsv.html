<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>예약 안내</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,'Noto Sans KR',sans-serif; background:#f0f0f0; min-height:100vh; padding:20px 0 40px; }
.wrap { max-width:420px; margin:0 auto; padding:0 16px; }
.section { background:#fff; border-radius:12px; margin-bottom:12px; overflow:hidden; }
.section-title { font-size:11px; font-weight:700; color:#7c6af7; padding:14px 16px 0; letter-spacing:0.5px; }
.row { display:flex; gap:10px; padding:10px 16px; border-bottom:1px solid #f5f5f5; }
.row:last-child { border-bottom:none; }
.lbl { font-size:12px; color:#e05a5a; font-weight:600; width:60px; flex-shrink:0; padding-top:1px; }
.val { font-size:14px; color:#222; font-weight:500; flex:1; line-height:1.6; }
.val a { color:#222; text-decoration:none; }
.notice { font-size:12px; color:#444; line-height:1.8; padding:12px 16px; white-space:pre-line; border-top:1px solid #f5f5f5; }
.map-wrap { width:100%; height:200px; border-top:1px solid #f5f5f5; }
#map { width:100%; height:100%; }
.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
.badge-confirmed { background:#e8f5e9; color:#2e7d32; }
.badge-pending   { background:#fff8e1; color:#e65100; }
.badge-cancelled { background:#fce4ec; color:#c62828; }
.top-bar { text-align:center; padding:24px 0 16px; }
.top-bar .brand { font-size:14px; font-weight:700; color:#7c6af7; letter-spacing:2px; margin-bottom:4px; }
.top-bar .sub { font-size:12px; color:#aaa; }
.loading { text-align:center; padding:60px; color:#aaa; font-size:13px; }
.err { text-align:center; padding:60px 20px; }
.err h2 { color:#e57373; font-size:15px; margin-bottom:6px; }
.err p { color:#aaa; font-size:12px; }
</style>
</head>
<body>
<div class="wrap">
  <div id="app"><div class="section"><div class="loading">불러오는 중...</div></div></div>
</div>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=5f0cc5697d54c89434269a04f5fe75e1&libraries=services"></script>
<script>
const SB = "https://dpftlrsuqxqqeouwbfjd.supabase.co";
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRwZnRscnN1cXhxcWVvdXdiZmpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5MDU4MjQsImV4cCI6MjA4NzQ4MTgyNH0.iydEkjtPjZ0jXpUUPJben4IWWneDqLomv-HDlcFayE4";
const H = { apikey: KEY, Authorization: "Bearer " + KEY };

const statusMap = {
  confirmed: ["예약확정","badge-confirmed"],
  pending:   ["대기중",  "badge-pending"],
  cancelled: ["취소됨",  "badge-cancelled"],
};

function showMap(addr) {
  if (!addr || typeof kakao === 'undefined') return;
  var geocoder = new kakao.maps.services.Geocoder();
  geocoder.addressSearch(addr, function(result, status) {
    if (status !== kakao.maps.services.Status.OK) return;
    var coords = new kakao.maps.LatLng(result[0].y, result[0].x);
    var mapDiv = document.getElementById('map');
    if (!mapDiv) return;
    var map = new kakao.maps.Map(mapDiv, { center: coords, level: 3 });
    new kakao.maps.Marker({ map: map, position: coords });
  });
}

async function load() {
  const id = new URLSearchParams(location.search).get("id");
  if (!id) { err("잘못된 접근", "예약 ID가 없습니다."); return; }
  try {
    let rows = [];
    let r = await fetch(`${SB}/rest/v1/reservations?reservation_id=eq.${encodeURIComponent(id)}&select=*&limit=1`, {headers:H});
    rows = await r.json();
    if (!rows.length) {
      r = await fetch(`${SB}/rest/v1/reservations?id=eq.${encodeURIComponent(id)}&select=*&limit=1`, {headers:H});
      rows = await r.json();
    }
    if (!rows.length) { err("예약 정보 없음", "예약 정보를 찾을 수 없습니다."); return; }
    const rsv = rows[0];

    let branch = {};
    if (rsv.bid) {
      r = await fetch(`${SB}/rest/v1/branches?id=eq.${rsv.bid}&select=name,phone,address,noti_config&limit=1`, {headers:H});
      const br = await r.json();
      if (br.length) {
        branch = br[0];
        try { branch.cfg = JSON.parse(branch.noti_config || "{}"); } catch { branch.cfg = {}; }
      }
    }

    const [stLabel, stCls] = statusMap[rsv.status] || [rsv.status || "-", ""];
    const fmtDate = d => d ? d.replace(/-/g, ".") : "-";
    const notice = branch.cfg?.branchNotice || "";
    const addr = branch.address || "";
    const hasMap = !!addr;

    document.getElementById("app").innerHTML = `
      <div class="section">
        <div class="section-title">예약 정보</div>
        <div class="row"><span class="lbl">예약일</span><span class="val">${fmtDate(rsv.date)}</span></div>
        <div class="row"><span class="lbl">예약시간</span><span class="val">${rsv.time || "-"}${rsv.dur ? " ("+rsv.dur+"분)" : ""}</span></div>
        <div class="row"><span class="lbl">예약장소</span><span class="val">${branch.name || "-"}</span></div>
        <div class="row"><span class="lbl">예약상태</span><span class="val"><span class="badge ${stCls}">${stLabel}</span></span></div>
      </div>
      <div class="section">
        <div class="section-title">지점 정보</div>
        <div class="row"><span class="lbl">상호</span><span class="val">${branch.name || "-"}</span></div>
        ${addr ? `<div class="row"><span class="lbl">주소</span><span class="val" style="font-size:13px;color:#555">${addr}</span></div>` : ""}
        ${branch.phone ? `<div class="row"><span class="lbl">전화번호</span><span class="val"><a href="tel:${branch.phone.replace(/-/g,"")}">${branch.phone}</a></span></div>` : ""}
        ${notice ? `<div class="notice">${notice}</div>` : ""}
        ${hasMap ? `<div class="map-wrap"><div id="map"></div></div>` : ""}
      </div>`;

    if (hasMap) showMap(addr);
  } catch(e) { err("오류", e.message); }
}

function err(t, m) {
  document.getElementById("app").innerHTML = `<div class="section"><div class="err"><h2>${t}</h2><p>${m}</p></div></div>`;
}

load();
</script>
</body>
</html>
