            if (!tags.length && !svcs.length) return null;
            return <>{tags.length>0 && <div><div style={{fontSize:11,color:"#999",marginBottom:6,fontWeight:500}}>서비스</div><div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {tags.map(t=><button key={t.id} onClick={()=>toggleTag(t.id)} style={{padding:"7px 14px",fontSize:12,fontWeight:mTags.includes(t.id)?600:400,background:mTags.includes(t.id)?(t.color||"#7c7cc8")+"15":"#f5f5f5",color:mTags.includes(t.id)?t.color||"#7c7cc8":"#bbb",border:mTags.includes(t.id)?`1.5px solid ${(t.color||"#7c7cc8")}40`:"1.5px solid #eee",borderRadius:8,cursor:"pointer",fontFamily:"inherit"}}>{t.name}</button>)}
            </div></div>}
            {svcs.length>0 && <div><div style={{fontSize:11,color:"#999",marginBottom:6,fontWeight:500}}>시술</div><div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {svcs.map(s=><button key={s.id} onClick={()=>toggleSvc(s.id)} style={{padding:"7px 14px",fontSize:12,fontWeight:mSvcs.includes(s.id)?600:400,background:mSvcs.includes(s.id)?"#7c7cc815":"#f5f5f5",color:mSvcs.includes(s.id)?"#7c7cc8":"#bbb",border:mSvcs.includes(s.id)?"1.5px solid #7c7cc840":"1.5px solid #eee",borderRadius:8,cursor:"pointer",fontFamily:"inherit"}}>{s.name}</button>)}
            </div></div>}</>;
          })()}
        </div>
        <div style={{display:"flex",gap:10,marginTop:20}}>
          <button onClick={reset} style={{flex:1,padding:"13px 0",fontSize:13,fontWeight:500,background:"#f5f5f5",color:"#888",border:"none",borderRadius:12,cursor:"pointer",fontFamily:"inherit"}}>다시</button>
          <button onClick={()=>onParsed(result)} style={{flex:2,padding:"13px 0",fontSize:14,fontWeight:600,background:"linear-gradient(135deg,#4285f4,#9b72cb)",color:"#fff",border:"none",borderRadius:12,cursor:"pointer",fontFamily:"inherit"}}>예약폼에 적용</button>
        </div>
      </div>}
    </div>

    {/* Bottom input bar */}
    {!isListening && !loading && !result && <div style={{flexShrink:0,padding:"8px 12px 16px",borderTop:"1px solid #f0f0f0",background:"#fff"}}>
      <div style={{display:"flex",alignItems:"flex-end",gap:4,background:"#f0f0f5",borderRadius:24,padding:"6px 6px 6px 16px"}}>
        <textarea ref={inputRef} value={input} onChange={e=>{setInput(e.target.value);e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,120)+"px";}}
          onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();handleSubmit();}}}
          onPaste={handlePaste}
          placeholder="메시지를 입력하거나 이미지를 붙여넣으세요..." rows={1}
          style={{flex:1,border:"none",background:"transparent",fontSize:14,fontFamily:"inherit",color:"#333",outline:"none",resize:"none",padding:"8px 0",lineHeight:1.5,maxHeight:120}}/>
        <input ref={fileRef} type="file" accept="image/*" onChange={handleImage} style={{display:"none"}}/>
        <input ref={camRef} type="file" accept="image/*" capture="environment" onChange={handleImage} style={{display:"none"}}/>
        <button onClick={()=>fileRef.current?.click()} style={{width:36,height:36,borderRadius:8,background:"transparent",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,color:"#888"}}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        </button>
        <button onClick={()=>camRef.current?.click()} style={{width:36,height:36,borderRadius:8,background:"transparent",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,color:"#888"}}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </button>
        {(input.trim() || imgData) ? <button onClick={handleSubmit} style={{width:36,height:36,borderRadius:8,background:"linear-gradient(135deg,#4285f4,#9b72cb)",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
        : <button onClick={startVoice} style={{width:36,height:36,borderRadius:8,background:"transparent",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,color:"#888"}}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>}
      </div>
      {imgPreview && <div style={{marginTop:6,fontSize:11,color:"#999",paddingLeft:16}}>📎 이미지 첨부됨</div>}
    </div>}
  </div>;
}

// ─── 서비스태그관리 ───
function AdminServiceTags({ data, setData }) {
  const [tags, setTags] = useState(()=>[...(data?.serviceTags || [])].sort((a,b)=>a.sort-b.sort));
  useEffect(() => { setData(p => p ? {...p, serviceTags: tags} : p); }, [tags]);

  const TAB_LABELS = { reservation: BLOCK_LABELS.reservation || "예약", schedule: "내부일정" };
  const [activeTab, setActiveTab] = useState("reservation");
  const [showAdd, setShowAdd] = useState(false);
  const [newTag, setNewTag] = useState({ name:"", dur:0, color:"" });
  const [editId, setEditId] = useState(null);
  const [editData, setEditData] = useState({});
  const [delConfirm, setDelConfirm] = useState(null);
  const [selected, setSelected] = useState(new Set());

  // 미리보기 드래그앤드롭 - ref로 관리해야 stale closure 방지
  const prevDragIdxRef = useRef(null);
  const prevOverIdxRef = useRef(null);
  const [prevDragOver, setPrevDragOver] = useState(null); // 시각적 하이라이트용만 state

  const previewTags = tabTags.filter(t=>t.useYn!==false);
  const onPrevDragStart = (i) => { prevDragIdxRef.current = i; };
  const onPrevDragEnter = (i) => { prevOverIdxRef.current = i; setPrevDragOver(i); };
  const onPrevDragEnd = () => {
    const di = prevDragIdxRef.current;
    const oi = prevOverIdxRef.current;
    setPrevDragOver(null);
    prevDragIdxRef.current = null;
    prevOverIdxRef.current = null;
    if (di === null || oi === null || di === oi) return;
    const reordered = [...previewTags];
    const [moved] = reordered.splice(di, 1);
    reordered.splice(oi, 0, moved);
    const otherTags = (tags||[]).filter(t => isScheduleTab ? t.scheduleYn !== "Y" : t.scheduleYn === "Y");
    const unusedTabs = tabTags.filter(t=>t.useYn===false);
    const newTabOrder = [...reordered, ...unusedTabs];
    const allSorted = [...newTabOrder, ...otherTags].map((t,i)=>({...t,sort:i}));
    syncTags(allSorted);
    newTabOrder.forEach((t,i) => sb.update("service_tags", t.id, {sort:i}).catch(console.error));
  };

  const isScheduleTab = activeTab === "schedule";
  const tabTags = (tags||[]).filter(t => isScheduleTab ? t.scheduleYn === "Y" : t.scheduleYn !== "Y");

  const syncTags = (updated) => { setTags(updated); if(setData) setData(prev=>prev ? {...prev,serviceTags:updated} : prev); };
  const [localTabTags, setLocalTabTags] = useState([]);
  useEffect(() => { setLocalTabTags(tabTags); }, [activeTab, tags]);
  const drag = useDragSort(localTabTags, setLocalTabTags, "sort", (reordered) => {
    const otherTags = (tags||[]).filter(t => isScheduleTab ? t.scheduleYn !== "Y" : t.scheduleYn === "Y");
    const allSorted = [...reordered, ...otherTags].map((t,i)=>({...t,sort:i}));
    syncTags(allSorted);
    reordered.forEach((s,i) => sb.update("service_tags", s.id, {sort: i}).catch(console.error));
  });

  // 배경색 → 대비색(흰/검) 자동 계산
  const getContrastColor = (hex) => {
    if (!hex || hex.length < 4) return "#333";
    const h = hex.replace("#","");
    const r = parseInt(h.length===3?h[0]+h[0]:h.slice(0,2),16);
    const g = parseInt(h.length===3?h[1]+h[1]:h.slice(2,4),16);
    const b = parseInt(h.length===3?h[2]+h[2]:h.slice(4,6),16);
    return (0.299*r + 0.587*g + 0.114*b) / 255 > 0.55 ? "#333" : "#fff";
  };

  // 태그 pill 스타일 (채우기, 테두리 없음)
  const tagPillStyle = (color, useYn) => {
    const bg = color || "#7c7cc8";
    return {
      padding:"4px 10px", borderRadius:20, border:"none",
      background: useYn===false ? "#d0d0d0" : bg,
      color: useYn===false ? "#999" : getContrastColor(bg),
      fontSize:11, fontWeight:600, display:"inline-flex", alignItems:"center", gap:3,
      opacity: useYn===false ? 0.5 : 1,
    };
  };

  const allChecked = tabTags.length > 0 && tabTags.every(t => selected.has(t.id));
  const toggleAll = () => { if (allChecked) setSelected(new Set()); else setSelected(new Set(tabTags.map(t => t.id))); };
  const toggleOne = (id) => setSelected(prev => { const s = new Set(prev); s.has(id)?s.delete(id):s.add(id); return s; });

  const bulkDelete = () => {
    if (selected.size === 0) return;
    const protectedSelected = [...selected].filter(id => SYSTEM_TAG_IDS.includes(id));
    if (protectedSelected.length > 0) { alert("신규, 예약금완료 태그는 시스템 태그로 삭제할 수 없습니다."); return; }
    if (!window.confirm(selected.size + "개 태그를 삭제하시겠습니까?\n삭제된 태그는 복구할 수 없습니다.")) return;
    selected.forEach(id => sb.del("service_tags", id).catch(console.error));
    syncTags((tags||[]).filter(t => !selected.has(t.id)).map((t,i) => ({...t, sort:i})));
    setSelected(new Set());
  };

  const tagToDb = (t) => ({id:t.id, business_id:_activeBizId, name:t.name, dur:t.dur||0,
    schedule_yn: t.scheduleYn==="Y"?"Y":"N", color:t.color||"", use_yn:t.useYn!==false, sort:t.sort||0});

  const addTag = () => {
    if(!newTag.name.trim()) return;
    const t = {id:uid(), name:newTag.name.trim(), dur:Number(newTag.dur)||0,
      scheduleYn: isScheduleTab ? "Y" : "N", color:newTag.color, useYn:true, sort:tags.length};
    syncTags([...tags, t]);
    sb.insert("service_tags", tagToDb(t)).catch(console.error);
    setNewTag({name:"",dur:0,color:""});
    setShowAdd(false);
  };

  const startEdit = (tag) => { setEditId(tag.id); setEditData({...tag}); };
  const saveEdit = () => {
    syncTags(tags.map(t=>t.id===editId?{...editData}:t));
    sb.update("service_tags", editId, {name:editData.name, dur:editData.dur||0,
      schedule_yn:editData.scheduleYn==="Y"||editData.scheduleYn===true?"Y":"N",
      color:editData.color||"", use_yn:editData.useYn!==false, sort:editData.sort||0}).catch(console.error);
    setEditId(null);
  };
  const toggleUse = (id) => {
    const tag = tags.find(t=>t.id===id);
    const newUse = tag?.useYn===false;
    syncTags(tags.map(t=>t.id===id?{...t,useYn:!t.useYn}:t));
    sb.update("service_tags", id, {use_yn:newUse}).catch(console.error);
  };
  const deleteTag = (id) => {
    if (SYSTEM_TAG_IDS.includes(id)) { alert("시스템 태그는 삭제할 수 없습니다."); return; }
    syncTags((tags||[]).filter(t=>t.id!==id).map((t,i)=>({...t,sort:i})));
    sb.del("service_tags", id).catch(console.error);
    setDelConfirm(null);
  };


  const inpS = {padding:"4px 6px",fontSize:11,background:"#f8f0f0",border:"1px solid #d0d0d0"};
  const downloadXl = () => XL.download(tabTags.map((t,i)=>({태그명:t.name, 소요분:t.dur, 색상:t.color||"", 사용:t.useYn!==false?"Y":"N"})), isScheduleTab?"내부일정태그.xlsx":"예약태그.xlsx", "태그", ["태그명","소요분","색상","사용"]);
  const uploadXl = async (e) => {
    const file = e.target.files[0]; if(!file) return;
    const rows = await XL.readFile(file);
    const newTags = rows.map(r=>({id:uid(), name:r["태그명"]||r["name"]||"", dur:Number(r["소요분"]||r["dur"])||0,
      scheduleYn: isScheduleTab?"Y":"N", color:r["색상"]||"", useYn:(r["사용"]||"Y")!=="N", sort:tags.length})).filter(r=>r.name);
    if(newTags.length && window.confirm(newTags.length+"개 태그를 추가하시겠습니까?")) {
      syncTags([...tags,...newTags]);
      newTags.forEach(t=>sb.insert("service_tags", tagToDb(t)).catch(console.error));
    }
  };

  return <div>
    <AdminHeader title="태그 관리" count={tags.length} onAdd={()=>setShowAdd(!showAdd)} addLabel={showAdd?"취소":<><I name="plus" size={12}/> 태그 추가</>} onDownload={downloadXl} onUpload={uploadXl}/>

    {/* 탭 버튼 */}
    <div style={{display:"flex",gap:2,marginBottom:12,background:"#e0e0e0",borderRadius:8,padding:3,width:"fit-content"}}>
      {Object.entries(TAB_LABELS).map(([key, label]) => (
        <button key={key} className={activeTab===key?"btn-p btn-sm":"btn-s btn-sm"}
          onClick={()=>{setActiveTab(key);setSelected(new Set());setShowAdd(false);}}>
          {label}태그 <span style={{fontSize:10,opacity:.7}}>({(key==="schedule"?(tags||[]).filter(t=>t.scheduleYn==="Y"):(tags||[]).filter(t=>t.scheduleYn!=="Y")).length})</span>
        </button>
      ))}
    </div>

    {showAdd && <div className="card" style={{padding:14,marginBottom:14}}>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
        <FLD label="태그명"><input className="inp" style={{width:160,...inpS}} value={newTag.name} onChange={e=>setNewTag(p=>({...p,name:e.target.value}))} placeholder="태그명" onKeyDown={e=>e.key==="Enter"&&addTag()}/></FLD>
        <FLD label="소요(분)"><input className="inp" type="number" style={{width:80,...inpS}} value={newTag.dur} onChange={e=>setNewTag(p=>({...p,dur:e.target.value}))}/></FLD>
        <FLD label="색상">
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <input type="color" value={newTag.color||"#7c7cc8"} onChange={e=>setNewTag(p=>({...p,color:e.target.value}))} style={{width:28,height:28,border:"none",borderRadius:6,cursor:"pointer",padding:0}}/>
            <EyeDrop onPick={c=>setNewTag(p=>({...p,color:c}))} size={22}/>
            <input className="inp" style={{width:75,...inpS,fontFamily:"monospace",fontSize:9}} value={newTag.color} onChange={e=>setNewTag(p=>({...p,color:e.target.value}))} placeholder="#7c7cc8"/>
            {newTag.color && <span style={{...tagPillStyle(newTag.color,true),fontSize:10,pointerEvents:"none"}}>{newTag.name||"미리보기"}</span>}
          </div>
        </FLD>
        <button className="btn-p btn-sm" onClick={addTag} style={{padding:"6px 18px"}}>추가 ({TAB_LABELS[activeTab]}태그)</button>
      </div>
    </div>}

    {/* 미리보기 — 드래그앤드롭 순서 변경 가능 */}
    <div className="card" style={{padding:12,marginBottom:14}}>
      <div style={{fontSize:10,color:"#888",marginBottom:6}}>미리보기 <span style={{color:"#bbb",fontSize:9}}>(드래그로 순서 변경)</span></div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,padding:8,background:"#f8f8f8",borderRadius:8,minHeight:36}} onDragOver={e=>e.preventDefault()}>
        {previewTags.map((t,i)=>(
          <span key={t.id}
            draggable
            onDragStart={()=>onPrevDragStart(i)}
            onDragEnter={()=>onPrevDragEnter(i)}
            onDragEnd={onPrevDragEnd}
            onDragOver={e=>e.preventDefault()}
            style={{...tagPillStyle(t.color,t.useYn),cursor:"grab",
              outline: prevDragOver===i ? "2px dashed #7c7cc8" : "none",
              opacity: 1,
              transition:"opacity .15s"}}>
            {t.name}{t.dur>0&&<span style={{fontSize:8,opacity:.7}}>({t.dur}분)</span>}
          </span>
        ))}
        {previewTags.length===0 && <span style={{color:"#bbb",fontSize:11}}>태그를 추가하세요</span>}
      </div>
    </div>

    {selected.size > 0 && <div style={{marginBottom:8}}><button className="btn-d btn-sm" onClick={bulkDelete} style={{fontSize:10,padding:"4px 12px"}}><I name="trash" size={12}/> 선택 삭제 ({selected.size})</button></div>}

    <div className="tw admin-tw" style={{maxHeight:"calc(100vh - 420px)",overflow:"auto"}}>
      <table><thead><tr>
        <th style={{width:30}}><input type="checkbox" checked={allChecked} onChange={toggleAll}/></th>
        <th style={{width:22}}></th><th style={{width:25}}>No</th><th>태그명</th>
        <th style={{width:55,textAlign:"center"}}>소요</th>
        <th style={{width:80,textAlign:"center"}}>색상</th><th style={{width:55,textAlign:"center"}}>사용</th>
        <th style={{width:35,textAlign:"center"}}>순서</th><th style={{width:65,textAlign:"center"}}>관리</th>
      </tr></thead><tbody>
      {(localTabTags.length > 0 ? localTabTags : tabTags).map((tag,i) => {
        const isSys = SYSTEM_TAG_IDS.includes(tag.id);
        if(editId===tag.id) return <tr key={tag.id} ref={drag.rowRef(i)} style={{background:"#f5f5ff"}}>
          <td>{isSys?<span style={{color:"#ccc",fontSize:10}}>🔒</span>:<input type="checkbox" checked={selected.has(tag.id)} onChange={()=>toggleOne(tag.id)}/>}</td>
          <td><DragHandle onTouchStart={drag.onTouchStart(i)}/></td><td style={{color:"#999"}}>{i+1}</td>
          <td><input className="inp" value={editData.name} onChange={e=>setEditData(p=>({...p,name:e.target.value}))} style={{width:"100%",...inpS}}/></td>
          <td><input className="inp" type="number" value={editData.dur} onChange={e=>setEditData(p=>({...p,dur:Number(e.target.value)||0}))} style={{width:50,...inpS}}/></td>
          <td><div style={{display:"flex",alignItems:"center",gap:3}}>
            <input type="color" value={editData.color||"#7c7cc8"} onChange={e=>setEditData(p=>({...p,color:e.target.value}))} style={{width:24,height:24,border:"none",borderRadius:4,cursor:"pointer",padding:0}}/>
            <EyeDrop onPick={c=>setEditData(p=>({...p,color:c}))} size={20}/>
            <input className="inp" style={{width:60,...inpS,fontFamily:"monospace",fontSize:9}} value={editData.color||""} onChange={e=>setEditData(p=>({...p,color:e.target.value}))}/>
            {editData.color && <span style={{...tagPillStyle(editData.color,true),fontSize:9,pointerEvents:"none"}}>{editData.name||"미리"}</span>}
          </div></td>
          <td style={{textAlign:"center"}}><select className="inp" style={{width:55,...inpS}} value={editData.useYn===false?"N":"Y"} onChange={e=>setEditData(p=>({...p,useYn:e.target.value==="Y"}))}><option value="Y">사용</option><option value="N">미사용</option></select></td>
          <td style={{textAlign:"center",color:"#bbb",fontSize:10}}>{i+1}</td>
          <td style={{textAlign:"center"}}><div style={{display:"flex",gap:3,justifyContent:"center"}}>
            <button className="btn-p btn-sm" onClick={saveEdit} style={{padding:"1px 6px",fontSize:9}}>저장</button>
            <button className="btn-s btn-sm" onClick={()=>setEditId(null)} style={{padding:"1px 4px",fontSize:9}}>취소</button>
          </div></td>
        </tr>;
        return <tr key={tag.id} ref={drag.rowRef(i)} draggable onDragStart={()=>drag.onDragStart(i)} onDragEnter={()=>drag.onDragEnter(i)} onDragEnd={drag.onDragEnd} onDragOver={e=>e.preventDefault()}
          style={{opacity:tag.useYn===false?0.45:1,background:drag.touchOverIdx===i?"#ede8ff":undefined}}>
          <td>{isSys?<span title="시스템 태그" style={{color:"#ccc",fontSize:10}}>🔒</span>:<input type="checkbox" checked={selected.has(tag.id)} onChange={()=>toggleOne(tag.id)}/>}</td>
          <td><DragHandle onTouchStart={drag.onTouchStart(i)}/></td>
          <td style={{color:"#999"}}>{i+1}</td>
          <td style={{fontWeight:600,fontSize:12}}>
            <span style={tagPillStyle(tag.color,tag.useYn)}>{tag.name}</span>
          </td>
          <td style={{textAlign:"center",fontSize:11,color:tag.dur>0?"#ef5350":"#d0d0d0",fontWeight:tag.dur>0?600:400}}>{tag.dur>0?tag.dur+"분":"-"}</td>
          <td style={{textAlign:"center"}}>{tag.color?<div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
            <div style={{width:28,height:18,borderRadius:4,background:tag.color}}/>
            <span style={{fontSize:8,color:"#888",fontFamily:"monospace"}}>{tag.color}</span>
          </div>:<span style={{color:"#bbb",fontSize:10}}>—</span>}</td>
          <td style={{textAlign:"center"}}><button onClick={()=>toggleUse(tag.id)}
            style={{fontSize:10,padding:"2px 6px",borderRadius:4,border:"1px solid "+(tag.useYn===false?"#e57373":"#d0d0d0"),cursor:"pointer",fontFamily:"inherit",
              background:tag.useYn===false?"#e5737320":"transparent",color:tag.useYn===false?"#e8a0a0":"#888"}}>{tag.useYn===false?"미사용":"사용"}</button></td>
          <td style={{textAlign:"center",color:"#bbb",fontSize:10}}>{i+1}</td>
          <td style={{textAlign:"center"}}><div style={{display:"flex",gap:3,justifyContent:"center"}}>
            <button onClick={()=>startEdit(tag)} style={{background:"none",border:"none",cursor:"pointer",color:"#7c7cc8",fontSize:12}}><I name="edit" size={13}/></button>
            {isSys ? <span title="삭제 불가" style={{color:"#e0e0e0",fontSize:12}}><I name="trash" size={13}/></span> : delConfirm===tag.id
              ? <><button className="btn-d btn-sm" onClick={()=>deleteTag(tag.id)} style={{padding:"1px 5px",fontSize:9}}>확인</button><button className="btn-s btn-sm" onClick={()=>setDelConfirm(null)} style={{padding:"1px 4px",fontSize:9}}>취소</button></>
              : <button onClick={()=>setDelConfirm(tag.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#e57373",fontSize:12}}><I name="trash" size={13}/></button>}
          </div></td>
        </tr>;
      })}
      </tbody></table>
    </div>
  </div>;
}


function EyeDrop({ onPick, size=20 }) {
  const supported = typeof window !== "undefined" && "EyeDropper" in window;
  if (!supported) return null;
  const pick = async () => {
    try {
      const ed = new EyeDropper();
      const r = await ed.open();
      if (r?.sRGBHex) onPick(r.sRGBHex);
    } catch(e) {}
  };
  return <button onClick={pick} title="화면에서 색상 추출" style={{width:size,height:size,border:"1px solid #d0d0d0",borderRadius:4,background:"#fff",cursor:"pointer",display:"inline-flex",alignItems:"center",justifyContent:"center",padding:0,flexShrink:0}}>
    <svg width={size-6} height={size-6} viewBox="0 0 16 16" fill="none" stroke="#666" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M13.5 2.5l-1-1-2 2-1-1-6 6-.5 3.5 3.5-.5 6-6-1-1 2-2z"/><path d="M3.5 9.5l3 3"/></svg>
  </button>;
}

function DatePick({ value, onChange, style, min }) {
  const DAYS = ["일","월","화","수","목","금","토"];
  const fmt = (v) => {
    if (!v) return "--";
    const p = v.split("-");
    const d = new Date(Number(p[0]), Number(p[1])-1, Number(p[2]));
    const dow = d.getDay();
    const clr = dow===0?"#e55":dow===6?"#47f":"#888";
    return <>{p[1]}.{p[2]}<span style={{color:clr,fontWeight:500,marginLeft:2}}>({DAYS[dow]})</span></>;
  };
  return <label style={{position:"relative",display:"inline-flex",alignItems:"center",gap:4,cursor:"pointer",...style}}>
    <I name="calPick" size={12} color="#88a8cc"/>
    <span style={{fontSize:13,fontWeight:400,whiteSpace:"nowrap",pointerEvents:"none",color:"#444",fontFamily:"inherit"}}>{fmt(value)}</span>
    <input type="date" value={value} onChange={e=>onChange(e.target.value)} min={min}
      style={{position:"absolute",inset:0,opacity:0,width:"100%",height:"100%",cursor:"pointer",fontSize:16}}/>
  </label>;
}
function FLD({ label, children }) {
  return <div><label style={{fontSize:12,fontWeight:600,color:"#777",marginBottom:5,display:"block"}}>{label}</label>{children}</div>;
}
