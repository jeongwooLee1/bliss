const SYSTEM_TAG_NAME_NEW_CUST = "신규";

let NEW_CUST_TAG_ID_GLOBAL = null;

function resolveSystemIds(tags, sources) {
  try {
    const tagList = Array.isArray(tags) ? tags : [];
    const srcList = Array.isArray(sources) ? sources : [];
    const newCustTag = tagList.find(t => t.name === SYSTEM_TAG_NAME_NEW_CUST && t.scheduleYn !== "Y");
    const prepaidTag = tagList.find(t => t.name === SYSTEM_TAG_NAME_PREPAID  && t.scheduleYn !== "Y");
    const naverSrc   = srcList.find(s => s.name === SYSTEM_SRC_NAME_NAVER);
    NEW_CUST_TAG_ID_GLOBAL = newCustTag?.id || null;
    PREPAID_TAG_ID         = prepaidTag?.id || null;
    NAVER_SRC_ID           = naverSrc?.id   || null;
    SYSTEM_TAG_IDS = [NEW_CUST_TAG_ID_GLOBAL, PREPAID_TAG_ID].filter(Boolean);
    SYSTEM_SRC_IDS = [NAVER_SRC_ID].filter(Boolean);
    console.log("[Bliss] 시스템 ID 해석:", { NEW_CUST_TAG_ID_GLOBAL, PREPAID_TAG_ID, NAVER_SRC_ID });
  } catch(e) {
    console.error("[Bliss] resolveSystemIds 오류:", e);
    SYSTEM_TAG_IDS = []; SYSTEM_SRC_IDS = [];
  }
}

const XL = {
  download(rows, filename, sheetName="Sheet1", headers) {
    if(typeof XLSX==="undefined"){alert("SheetJS 로드 중...");return;}
    let ws;
    if(rows.length===0 && headers){
      ws=XLSX.utils.aoa_to_sheet([headers]);
    } else {
      ws=XLSX.utils.json_to_sheet(rows);
    }
    const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,sheetName); XLSX.writeFile(wb,filename);
  },
  readFile(file) {
    return new Promise((resolve) => {
      const reader=new FileReader();
      reader.onload=ev=>{const wb=XLSX.read(ev.target.result,{type:"array"});resolve(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]));};
      reader.readAsArrayBuffer(file);
    });
  }
};

function toDb(table,obj){const m=DBMAP[table];if(!m){const r={...obj};delete r.created_at;return r;}const rev={};for(const[k,v]of Object.entries(m))rev[v]=k;const r={};for(const[k,v]of Object.entries(obj)){if(k==="created_at"||k==="_ua")continue;r[rev[k]||k]=v;}

  if(table==="app_users"){if(Array.isArray(r.branch_ids))r.branch_ids=JSON.stringify(r.branch_ids);if(Array.isArray(r.view_branch_ids))r.view_branch_ids=JSON.stringify(r.view_branch_ids);}

  if(_activeBizId && cols.includes("business_id") && !f.business_id) f.business_id=_activeBizId;
  if(table==="reservations"||table==="sales") console.log(`toDb(${table}) final keys:`,Object.keys(f).join(","));
  return f;}return r;}

  const tpl = typeof cols === "number"

// ─── 알림톡 발송 (alimtalk_queue INSERT → Oracle 서버가 알리고 직접 호출) ───
const sendAlimtalk = async (notiKey, phone, params, branchCfg, branchId) => {
  try {
    const cfg = branchCfg || {};
    const noti = cfg[notiKey] || {};
    if(!noti.on || !noti.tplCode || !noti.msgTpl) return null;
    if(!cfg.aligoKey || !cfg.aligoId || !cfg.senderKey || !cfg.senderPhone || !phone) return null;
    const r = await fetch(SB_URL+"/rest/v1/alimtalk_queue", {
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+SB_KEY,"apikey":SB_KEY,"Prefer":"return=minimal"},
      body:JSON.stringify({branch_id:branchId||"", noti_key:notiKey, phone, params:params||{}})
    });
    if(r.ok) console.log("알림톡 큐 등록:", notiKey, phone);
    return r.ok;
  } catch(e) { console.warn("알림톡 큐 등록 실패:", e.message); return null; }
};

function TimeSelect({ value, onChange, times }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  const listRef = useRef(null);

  useEffect(() => {
    if (!open) return;
    // 선택 항목으로 스크롤
    setTimeout(() => {
      if (listRef.current) {
        const active = listRef.current.querySelector('.active');
        if (active) active.scrollIntoView({ block: 'center' });
      }
    }, 0);
    const close = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', close);
    return () => document.removeEventListener('mousedown', close);
  }, [open]);

  return <span className="time-sel-wrap" ref={ref}>
    <button className="time-sel-btn" onClick={() => setOpen(o => !o)} type="button">{value}</button>
    {open && <div className="time-sel-dropdown">
      <ul ref={listRef}>
        {times.map(t => <li key={t}
          className={"time-sel-item" + (t === value ? " active" : "")}
          onMouseDown={e => { e.preventDefault(); onChange(t); setOpen(false); }}>
          {t}
        </li>)}
      </ul>
    </div>}
  </span>;
}

const getNaverVal = (requestMsg, keywords) => {
  if (!requestMsg) return "";
  if (requestMsg.trim().startsWith("[")) {
    try {
      const items = JSON.parse(requestMsg);
      for (const it of items) {
        if (keywords.some(kw => (it.label||"").includes(kw))) return it.value || "";
      }
    } catch(e) {}
  }
  return "";
};

// Lucide-style SVG icons
// ── 터치+마우스 통합 드래그정렬 훅 ─────────────────────────────────────────
function useTouchDragSort(items, onReorder) {
  const dragIdx = React.useRef(null);
  const dragOverIdx = React.useRef(null);
  const [overIdx, setOverIdx] = React.useState(null);
  const ghostRef = React.useRef(null);

  const doReorder = (from, to) => {
    if (from === null || to === null || from === to) return;
    const arr = [...items];
    const [moved] = arr.splice(from, 1);
    arr.splice(to, 0, moved);
    onReorder(arr);
  };

  // PC 마우스 핸들러
  const mouseHandlers = (idx) => ({
    draggable: true,
    onDragStart: () => { dragIdx.current = idx; },
    onDragEnter: () => { dragOverIdx.current = idx; setOverIdx(idx); },
    onDragEnd: () => {
      doReorder(dragIdx.current, dragOverIdx.current);
      dragIdx.current = null; dragOverIdx.current = null; setOverIdx(null);
    },
    onDragOver: e => e.preventDefault(),
  });

  // 모바일 터치 핸들러
  const touchHandlers = (idx, getItems) => ({
    onTouchStart: (e) => {
      dragIdx.current = idx;
      const touch = e.touches[0];
      // 고스트 엘리먼트 생성
      const el = e.currentTarget;
      const rect = el.getBoundingClientRect();
      const ghost = el.cloneNode(true);
      ghost.style.cssText = `position:fixed;top:${rect.top}px;left:${rect.left}px;width:${rect.width}px;opacity:0.8;z-index:9999;pointer-events:none;background:white;box-shadow:0 8px 24px rgba(0,0,0,.2);border-radius:12px;transform:scale(1.02)`;
      document.body.appendChild(ghost);
      ghostRef.current = ghost;
      e.currentTarget._touchOffsetY = touch.clientY - rect.top;
    },
    onTouchMove: (e) => {
      e.preventDefault();
      if (dragIdx.current === null) return;
      const touch = e.touches[0];
      if (ghostRef.current) {
        ghostRef.current.style.top = (touch.clientY - (e.currentTarget._touchOffsetY || 30)) + 'px';
      }
      // 현재 손가락 아래 아이템 찾기
      ghostRef.current && (ghostRef.current.style.display = 'none');
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      ghostRef.current && (ghostRef.current.style.display = '');
      const itemEl = el?.closest('[data-drag-idx]');
      if (itemEl) {
        const newIdx = parseInt(itemEl.dataset.dragIdx);
        if (!isNaN(newIdx) && newIdx !== dragOverIdx.current) {
          dragOverIdx.current = newIdx;
          setOverIdx(newIdx);
        }
      }
    },
    onTouchEnd: () => {
      if (ghostRef.current) { ghostRef.current.remove(); ghostRef.current = null; }
      doReorder(dragIdx.current, dragOverIdx.current);
      dragIdx.current = null; dragOverIdx.current = null; setOverIdx(null);
    },
  });

  return { mouseHandlers, touchHandlers, overIdx };
}

// ─── Modal close animation utility ───
function _mc(cb) {
  const os = [...document.querySelectorAll('.ov')];
  const o = os[os.length - 1];
  if (!o) { cb(); return; }
  const m = o.children[0];
  o.style.transition = 'opacity .25s';
  o.style.opacity = '0';
  if (m) {
    m.style.transition = 'transform .25s cubic-bezier(.4,0,.6,1), opacity .2s';
    m.style.transform = 'scale(.88)';
    m.style.opacity = '0';
  }
  setTimeout(cb, 260);
}

    const onVisible = async () => {

    // Realtime 구독
    if (supaClient) {
      try {
        channel = supaClient.channel("rt_" + Date.now())
          .on("postgres_changes", { event: "*", schema: "public", table: "reservations", filter: "business_id=eq." + currentBizId }, (payload) => {
            const ev = payload.eventType;
            const row = payload.new || {};
            const oldRow = payload.old || {};
            setData(prev => {
              if (!prev) return prev;
              try {
                const parsed = row.id ? fromDb("reservations", [row])[0] : null;
                if (ev === "INSERT" && parsed) {
                  if (isModalOpenRef.current) {
                    if (!pendingRTQueueRef.current.some(q=>q.ev==="INSERT"&&q.data.id===parsed.id)) {
                      pendingRTQueueRef.current = [...pendingRTQueueRef.current, {ev:"INSERT",data:parsed}];
                      setRtPendingCount(pendingRTQueueRef.current.length);
                    }
                    return prev;
                  }
                  if ((prev?.reservations||[]).some(r => r.id === parsed.id)) return prev;
                  return {...prev, reservations: [...(prev?.reservations||[]), parsed]};
                }
                if (ev === "UPDATE" && parsed) {
                  if (isModalOpenRef.current) {
                    pendingRTQueueRef.current = [
                      ...pendingRTQueueRef.current.filter(q=>!(q.ev==="UPDATE"&&q.data.id===parsed.id)),
                      {ev:"UPDATE",data:parsed}
                    ];
                    setRtPendingCount(pendingRTQueueRef.current.length);
                    return prev;
                  }
                  const before = (prev?.reservations||[]).find(r => r.id === parsed.id);
                  const isNaver = parsed.source === "naver" || parsed.source === "네이버";
                  return {...prev, reservations: (prev?.reservations||[]).map(r => r.id === parsed.id ? {...r, ...parsed} : r)};
                }
                if (ev === "DELETE") {
                  const delId = oldRow.id;
                  return delId ? {...prev, reservations: (prev?.reservations||[]).filter(r => r.id !== delId)} : prev;
                }
              } catch(e) {}
              return prev;
            });
          })
          .subscribe((status) => {
            console.log("RT:", status);
          });
      } catch(e) { console.log("RT setup error:", e); }
    }

    return () => {
      document.removeEventListener("visibilitychange", onVisible);
      if (channel && supaClient) { try { supaClient.removeChannel(channel); } catch(e){} }
    };
  }, [phase, currentBizId]);

  return (

        <Sidebar nav={nav} page={page} setPage={setPage} role={role} branchNames={branchNames} onLogout={handleLogout} bizName={bizName} isSuper={isSuper} onBackToSuper={handleBackToSuper} serverV={serverV}/>
      </aside>
      {sideOpen && <div className="sidebar-m" style={{position:"fixed",inset:0,zIndex:300}}>
        <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.5)"}} onClick={()=>setSideOpen(false)}/>
        <div style={{position:"relative",width:260,height:"100%",background:T.bgCard,display:"flex",flexDirection:"column",animation:"slideIn .5s cubic-bezier(.22,1,.36,1)"}}>
          <Sidebar nav={nav} page={page} setPage={p=>{setPage(p);setSideOpen(false)}} role={role} branchNames={branchNames} onLogout={handleLogout} bizName={bizName} isSuper={isSuper} onBackToSuper={handleBackToSuper} serverV={serverV}/>
        </div>

      <main className="main-c" style={S.main}>

          <div style={{marginLeft:"auto",display:"flex",flexDirection:"column",alignItems:"flex-end",gap:1}}>

            {page==="timeline" && <Timeline data={data} setData={setData} userBranches={userBranches} viewBranches={viewBranches} isMaster={isMaster} currentUser={currentUser} setPage={setPage} bizId={currentBizId} onMenuClick={()=>setSideOpen(true)} bizName={bizName} pendingOpenRes={pendingOpenRes} setPendingOpenRes={setPendingOpenRes} naverColShow={naverColShow} scraperStatus={scraperStatus}/>}

            {page==="sales" && <SalesPage data={data} setData={setData} userBranches={userBranches} isMaster={isMaster} setPage={setPage}/>}

            {page==="customers" && <CustomersPage data={data} setData={setData} userBranches={userBranches} isMaster={isMaster}/>}
            {page==="users" && <UsersPage data={data} setData={setData} bizId={currentBizId}/>}
            {page==="messages" && <AdminInbox sb={sb} branches={data?.branches} data={data} onRead={()=>setUnreadMsgCount(0)}/>}
            {page==="admin" && <AdminPage data={data} setData={setData} bizId={currentBizId} serverV={serverV} onLogout={handleLogout} currentUser={currentUser}/>}

      </main>
      <div style={{position:"fixed",bottom:"calc(56px + env(safe-area-inset-bottom) + 2px)",left:0,right:0,height:16,display:"flex",alignItems:"center",justifyContent:"center",gap:6,zIndex:199,pointerEvents:"none"}}>

        <span style={{fontSize:9,color:serverV?"#03C75A":T.textMuted,opacity:.85,textShadow:"0 0 4px #fff,0 0 4px #fff"}}>서버 {serverV?`v${serverV}`:"…"}</span>
        {scraperStatus && <span style={{fontSize:9,opacity:.85,textShadow:"0 0 4px #fff,0 0 4px #fff",color:scraperStatus.isWarning?"#E65100":T.textMuted,fontWeight:scraperStatus.isWarning?800:400}}>{scraperStatus.isWarning?"⚠️":"✅"}{scraperStatus.lastScraped?(()=>{const h=Math.floor(scraperStatus.scrapedDiffH);const m=Math.floor((scraperStatus.scrapedDiffH%1)*60);return h>0?`${h}h${m>0?` ${m}m`:""} 전`:`${m}m 전`;})():"스크래핑 기록없음"}</span>}
      </div>
      <MobileBottomNav nav={nav} page={page} setPage={setPage}/>
    </div>

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  componentDidCatch(e, info) {
    console.error("[Bliss] ERROR:", e.message);
    console.error("[Bliss] STACK:", e.stack);
    console.error("[Bliss] COMPONENT:", info.componentStack);
    this.setState({ errorInfo: info });
  }
  render() {
    if (this.state.error) {
      const stack = this.state.error?.stack || "";
      const component = this.state.errorInfo?.componentStack || "";
      return <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",background:T.bg,fontFamily:"sans-serif",padding:24}}>
        <div style={{fontSize:32,marginBottom:16}}>⚠️</div>
        <div style={{fontSize:T.fs.xl,fontWeight:T.fw.bolder,color:T.text,marginBottom:8}}>화면을 불러오지 못했습니다</div>
        <div style={{fontSize:T.fs.sm,color:T.danger,marginBottom:8,fontFamily:"monospace",maxWidth:600,wordBreak:"break-all"}}>{this.state.error.message}</div>
        <pre style={{fontSize:T.fs.xs,color:T.textSub,maxWidth:700,maxHeight:180,overflow:"auto",background:T.gray200,padding:8,borderRadius:T.radius.md,marginBottom:16,textAlign:"left"}}>{stack.slice(0,1500)}</pre>
        <pre style={{fontSize:T.fs.xs,color:T.textMuted,maxWidth:700,maxHeight:100,overflow:"auto",background:T.bg,padding:8,borderRadius:T.radius.md,marginBottom:20,textAlign:"left"}}>{component.slice(0,500)}</pre>
        <button onClick={()=>window.location.reload()} style={{padding:"10px 24px",background:T.primary,color:T.bgCard,border:"none",borderRadius:T.radius.md,fontSize:T.fs.md,cursor:"pointer",fontWeight:T.fw.bold}}>
          새로고침
        </button>
        <div style={{marginTop:12,fontSize:T.fs.xxs,color:T.gray400}}>문제가 계속되면 Ctrl+Shift+R (강제 새로고침)</div>
      </div>;
    }
    return this.props.children;
  }
}

function Loading({msg}) {
  return <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",background:T.bg,color:T.textSub,fontFamily:"'Pretendard',sans-serif",gap:T.sp.md}}>
    <Spinner size={28}/>
    <div style={{fontSize:T.fs.md}}>{msg||"로딩 중..."}</div>
  </div>;
}

function SuperDashboard({ superData, setSuperData, currentUser, onLogout, onEnterBiz }) {
  const [tab, setTab] = useState("businesses");
  const { businesses=[], groups=[], groupMembers=[], users=[] } = superData || {};

  // ── Business CRUD ──
  const [bizForm, setBizForm] = useState(null);
  const saveBiz = async () => {
    if (!bizForm?.name || !bizForm?.code) return alert("업체명과 대표 아이디를 입력하세요");
    const isNew = !bizForm.id;
    const biz = isNew ? { ...bizForm, id: "biz_" + uid() } : bizForm;
    if (isNew) {
      await sb.insert("businesses", { id:biz.id, name:biz.name, code:biz.code, phone:biz.phone||"", settings:biz.settings||"" });
      const ownerId = "acc_" + uid();
      await sb.insert("app_users", { id:ownerId, business_id:biz.id, login_id:biz.code, password:"1234", name:biz.name+" 대표", role:"owner", branch_ids:"[]", view_branch_ids:"[]" });
      // Auto-assign group if selected
      if (bizForm.groupId) {
        const gm = { id:"gm_"+uid(), group_id:bizForm.groupId, business_id:biz.id };
        await sb.insert("business_group_members", gm);
        setSuperData(p => ({...p, businesses:[...p.businesses, biz], users:[...p.users, {id:ownerId, businessId:biz.id, loginId:biz.code, pw:"1234", name:biz.name+" 대표", role:"owner", branches:[], viewBranches:[]}], groupMembers:[...p.groupMembers, gm]}));
      } else {
        setSuperData(p => ({...p, businesses:[...p.businesses, biz], users:[...p.users, {id:ownerId, businessId:biz.id, loginId:biz.code, pw:"1234", name:biz.name+" 대표", role:"owner", branches:[], viewBranches:[]}]}));
      }
    } else {
      await sb.update("businesses", biz.id, { name:biz.name, code:biz.code, phone:biz.phone||"", settings:biz.settings||"" });
      // Update group membership
      const curMem = groupMembers.find(m=>m.business_id===biz.id);
      if (bizForm.groupId && (!curMem || curMem.group_id!==bizForm.groupId)) {
        if (curMem) await sb.del("business_group_members", curMem.id);
        const gm = { id:"gm_"+uid(), group_id:bizForm.groupId, business_id:biz.id };
        await sb.insert("business_group_members", gm);
        setSuperData(p => ({...p, businesses:p.businesses.map(b=>b.id===biz.id?biz:b), groupMembers:[...(p?.groupMembers||[]).filter(m=>m.business_id!==biz.id), gm]}));
      } else if (!bizForm.groupId && curMem) {
        await sb.del("business_group_members", curMem.id);
        setSuperData(p => ({...p, businesses:p.businesses.map(b=>b.id===biz.id?biz:b), groupMembers:(p?.groupMembers||[]).filter(m=>m.business_id!==biz.id)}));
      } else {
        setSuperData(p => ({...p, businesses:p.businesses.map(b=>b.id===biz.id?biz:b)}));
      }
    }
    setBizForm(null);
  };
  const deleteBiz = async (id) => {
    if (!confirm("이 사업자를 삭제하시겠습니까? 모든 데이터가 삭제됩니다.")) return;
    await sb.del("businesses", id);
    setSuperData(p => ({...p, businesses:(p?.businesses||[]).filter(b=>b.id!==id)}));
  };
  const seedBizTemplates = async (bizId) => {
    const prefix = bizId.replace("biz_","");
    const br = { id:`br_${prefix}_1`, business_id:bizId, name:"본점", short:"본점", phone:"", address:"", color:T.bgCard, sort:0, use_yn:true };
    await sb.insert("branches", br);
    await sb.insert("rooms", { id:`rm_${prefix}_1`, business_id:bizId, branch_id:br.id, name:"담당자1", color:"", sort_order:0 });
    const cats = ["왁싱","페이셜","바디","기타"];
    for (let i=0;i<cats.length;i++) await sb.insert("service_categories", { id:`cat_${prefix}_${i}`, business_id:bizId, name:cats[i], sort:i });
    alert("기본 템플릿이 등록되었습니다.");
  };

    const curMem = groupMembers.find(m=>m.business_id===b.id);
    setBizForm({...b, groupId: curMem?.group_id||""});

          borderLeft:tab===t.id?"3px solid #7c7cc8":"3px solid transparent",

    <div style={{padding:12,borderTop:"1px solid "+T.border}}>
      <button onClick={onLogout} style={{width:"100%",padding:"8px 14px",borderRadius:T.radius.sm,border:"1px solid #d0d0d0",background:T.bgCard,color:T.textSub,cursor:"pointer",fontSize:T.fs.sm,fontWeight:T.fw.bold,fontFamily:"inherit"}}>로그아웃</button>
    </div>
  </>;

  return (

      <style>{CSS}</style>
      {/* Desktop sidebar */}
      <aside className="sidebar-d" style={{width:220,background:T.bgCard,borderRight:"1px solid "+T.border,display:"flex",flexDirection:"column"}}>
        <SideContent/>
      </aside>

      {sideOpen && <div className="sidebar-m" style={{position:"fixed",inset:0,zIndex:300}}>
        <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.5)"}} onClick={()=>setSideOpen(false)}/>

          <span style={{fontSize:T.fs.xl,fontWeight:T.fw.black,color:T.danger}}>v{BLISS_V}</span>
        </div>
        <div className="page-pad" style={{flex:1,padding:24,overflow:"auto",WebkitOverflowScrolling:"touch"}}>
        {/* ── 업체 관리 ── */}
        {tab==="businesses" && <div>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,flexWrap:"wrap"}}>
            <h2 style={{fontSize:T.fs.xl,fontWeight:T.fw.black,color:T.text}}><I name="building" size={18}/> 업체 관리</h2>
            <span style={{fontSize:T.fs.sm,color:T.textSub}}>{businesses.length}개 업체</span>
            <Btn variant="primary" style={{marginLeft:"auto"}} onClick={()=>setBizForm({name:"",code:"",phone:"",memo:"",groupId:""})}><I name="plus" size={12}/> 업체 추가</Btn>

                  <td style={{display:"flex",gap:T.sp.xs}}>
                    <Btn variant="primary" style={{padding:"4px 10px",fontSize:T.fs.xxs}} onClick={()=>onEnterBiz(b.id)}>접속</Btn>
                    <Btn variant="secondary" style={{padding:"4px 10px",fontSize:T.fs.xxs}} onClick={()=>startEditBiz(b)}>수정</Btn>
                    <Btn variant="secondary" style={{padding:"4px 10px",fontSize:T.fs.xxs}} onClick={()=>seedBizTemplates(b.id)}>템플릿</Btn>
                    <Btn variant="danger" style={{padding:"4px 10px",fontSize:T.fs.xxs}} onClick={()=>deleteBiz(b.id)}>삭제</Btn>
                  </td>
                </tr>;
              })}
              {businesses.length===0 && <tr><td colSpan={7} style={{textAlign:"center",color:T.gray500,padding:40}}>등록된 업체가 없습니다</td></tr>}
            </tbody></DataTable>
        </div>}

        {/* ── 사용자 ── */}
        {tab==="users" && <SuperUsers users={users} businesses={businesses} superData={superData} setSuperData={setSuperData}/>}
        {tab==="settings" && <SuperSystemSettings/>}
        </div>
      </main>
    </div>
  );
}

// ─── Super: 전체 사용자 관리 ───
function SuperUsers({ users, businesses, superData, setSuperData }) {
  const [editId, setEditId] = useState(null);
  const [form, setForm] = useState(null);

  const startAdd = () => { setEditId("new"); setForm({name:"", loginId:"", pw:"1234", role:"owner", businessId:businesses[0]?.id||"", branches:[], viewBranches:[]}); };
  const startEdit = (u) => { setEditId(u.id); setForm({...u}); };
  const cancel = () => { setEditId(null); setForm(null); };

  const save = async () => {
    if(!form.name||!form.loginId||!form.pw) { alert("이름, 아이디, 비밀번호를 입력하세요."); return; }
    if(editId==="new") {
      const newU = {...form, id:"acc_"+uid()};
      await sb.insert("app_users", {id:newU.id, business_id:newU.businessId||null, login_id:newU.loginId, password:newU.pw, name:newU.name, role:newU.role, branch_ids:JSON.stringify(newU.branches||[]), view_branch_ids:JSON.stringify(newU.viewBranches||[])}).catch(console.error);
      setSuperData(p=>({...p, users:[...p.users, newU]}));
    } else {
      await sb.update("app_users", editId, {business_id:form.businessId||null, login_id:form.loginId, password:form.pw, name:form.name, role:form.role, branch_ids:JSON.stringify(form.branches||[]), view_branch_ids:JSON.stringify(form.viewBranches||[])}).catch(console.error);
      setSuperData(p=>({...p, users:p.users.map(u=>u.id===editId?{...form}:u)}));
    }
    cancel();
  };
  const remove = async (id) => {
    if(!window.confirm("이 사용자를 삭제하시겠습니까?")) return;
    await sb.del("app_users", id).catch(console.error);
    setSuperData(p=>({...p, users:(p?.users||[]).filter(u=>u.id!==id)}));
  };

  const roleLabel = (r) => r==="super"?"슈퍼":r==="owner"?"대표":"직원";
  const roleBg = (r) => r==="super"?"#e5737315":r==="owner"?"#7c7cc815":T.bg;
  const roleClr = (r) => r==="super"?T.female:r==="owner"?T.primary:T.gray600;

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:T.sp.sm}}>
      <h2 style={{fontSize:T.fs.xl,fontWeight:T.fw.black,color:T.text}}><I name="user" size={18}/> 전체 사용자 <span style={{fontSize:T.fs.sm,fontWeight:T.fw.normal,color:T.gray500}}>{users.length}명</span></h2>
      <Btn variant="primary" onClick={startAdd}><I name="plus" size={12}/> 사용자 추가</Btn>
    </div>

    {form && <div className="card" style={{padding:20,marginBottom:16}}>
      <h3 style={{fontSize:T.fs.md,fontWeight:T.fw.bolder,marginBottom:12}}>{editId==="new"?"사용자 추가":"사용자 수정"}</h3>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
        <FLD label="이름"><input className="inp" style={{width:"100%",maxWidth:120}} value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/></FLD>
        <FLD label="아이디"><input className="inp" style={{width:"100%",maxWidth:120}} value={form.loginId} onChange={e=>setForm(p=>({...p,loginId:e.target.value}))}/></FLD>
        <FLD label="비밀번호"><input className="inp" style={{width:"100%",maxWidth:100}} value={form.pw} onChange={e=>setForm(p=>({...p,pw:e.target.value}))}/></FLD>
        <FLD label="유형"><select className="inp" style={{width:"100%",maxWidth:90}} value={form.role} onChange={e=>setForm(p=>({...p,role:e.target.value}))}>
          <option value="super">슈퍼</option><option value="owner">대표</option><option value="staff">직원</option>
        </select></FLD>
        <FLD label="업체"><select className="inp" style={{width:"100%",maxWidth:150}} value={form.businessId||""} onChange={e=>setForm(p=>({...p,businessId:e.target.value}))}>
          <option value="">없음</option>{businesses.map(b=><option key={b.id} value={b.id}>{b.name}</option>)}
        </select></FLD>
        <div style={{display:"flex",gap:6}}>
          <Btn variant="primary" style={{padding:"7px 16px"}} onClick={save}>{editId==="new"?"추가":"저장"}</Btn>
          <Btn variant="secondary" style={{padding:"7px 16px"}} onClick={cancel}>취소</Btn>
        </div>
      </div>
    </div>}

    <DataTable card><thead><tr>
        <th>이름</th><th>아이디</th><th>유형</th><th>업체</th><th>비밀번호</th><th style={{width:120}}>관리</th>
      </tr></thead><tbody>
        {users.map(u=>{
          const biz = businesses.find(b=>b.id===u.businessId);
          return <tr key={u.id}>
            <td style={{fontWeight:T.fw.bold}}>{u.name}</td>
            <td style={{color:T.primary}}>{u.loginId||u.login_id}</td>
            <td><span style={{fontSize:T.fs.xs,padding:"2px 8px",borderRadius:T.radius.lg,background:roleBg(u.role),color:roleClr(u.role),fontWeight:T.fw.bold}}>{roleLabel(u.role)}</span></td>
            <td style={{fontSize:T.fs.sm,color:T.gray700}}>{biz?.name||"-"}</td>
            <td style={{color:T.textMuted}}>{"•".repeat((u.pw||u.password||"").length)}</td>
            <td style={{display:"flex",gap:T.sp.xs}}>
              <Btn variant="secondary" style={{padding:"4px 10px",fontSize:T.fs.xxs}} onClick={()=>startEdit(u)}>수정</Btn>
              {u.role!=="super" && <Btn variant="danger" style={{padding:"4px 10px",fontSize:T.fs.xxs}} onClick={()=>remove(u.id)}>삭제</Btn>}
            </td>
          </tr>;
        })}
      </tbody></DataTable>
  </div>;
}


// ─── SignupWizard ───
function SignupWizard({ onComplete, onBack }) {
  const [step, setStep]     = useState(1); // 1=계정, 2=사업장, 3=완료
  const [saving, setSaving] = useState(false);

  // STEP1: 계정 정보
  const [acct, setAcct] = useState({ name:'', loginId:'', pw:'', pw2:'' });
  const setA = (k,v) => setAcct(p=>({...p,[k]:v}));

  // STEP2: 사업장 목록 [{name, phone}]
  const [bizName, setBizName]   = useState('');  // 브랜드명 (businesses.name)
  const [branches, setBranches] = useState([]);  // [{name, phone}]
  const [addName, setAddName]   = useState('');
  const [addPhone, setAddPhone] = useState('');
  const [showAddForm, setShowAddForm] = useState(false);

  // 유효성
  const [errs, setErrs] = useState({});
  const setErr = (k,v) => setErrs(p=>({...p,[k]:v}));

  /* ── STEP1 다음 ── */
  const nextStep1 = () => {
    const e = {};
    if (!acct.name.trim()) e.name = '이름을 입력해주세요';
    if (!acct.loginId.trim()) e.loginId = '아이디를 입력해주세요';
    if (!/^[a-zA-Z0-9_]{3,20}$/.test(acct.loginId)) e.loginId = '아이디는 영문/숫자/언더바 3~20자로 입력해주세요';
    if (acct.pw.length < 4) e.pw = '비밀번호는 4자 이상이어야 해요';
    if (acct.pw !== acct.pw2) e.pw2 = '비밀번호가 일치하지 않아요';
    setErrs(e);
    if (Object.keys(e).length === 0) setStep(2);
  };

  /* ── 지점 추가 ── */
  const addBranchItem = () => {
    if (!addName.trim()) { setErr('addName','지점 이름을 입력해주세요'); return; }
    if (branches.length >= 3) return;
    setBranches(p=>[...p,{name:addName.trim(), phone:addPhone.trim()}]);
    setAddName(''); setAddPhone(''); setShowAddForm(false); setErr('addName','');
  };

  const removeBranch = (i) => setBranches(p=>p.filter((_,idx)=>idx!==i));

  /* ── 최종 제출 ── */
  const submit = async () => {
    if (branches.length === 0) { alert('지점을 먼저 등록해주세요.'); return; }
      if (!bizName.trim()) { alert('브랜드명을 입력해주세요.'); return; }
    setSaving(true);
    try {
      // 아이디 중복 체크
      const ex = await sb.get('app_users','&login_id=eq.'+encodeURIComponent(acct.loginId));
      if (ex.length > 0) { alert('이미 사용 중인 아이디입니다.'); setSaving(false); return; }

      const bizId = 'biz_'+uid();
      const oId   = 'acc_'+uid();
      const exp   = new Date(); exp.setDate(exp.getDate()+14);

      // businesses 생성
      await sb.insert('businesses', {
        id: bizId, name: bizName.trim(),
        code: acct.loginId,
        phone: branches[0].phone||'',
        settings: JSON.stringify({ plan:'trial', planExpiry: exp.toISOString().slice(0,10) }),
        use_yn: true
      });

      // branches 생성
      const brIds = [];
      for (let i=0; i<branches.length; i++) {
        const brId = 'br_'+uid();
        brIds.push(brId);
        await sb.insert('branches', {
          id: brId, business_id: bizId,
          name: branches[i].name,
          short: branches[i].name.slice(0,5),
          phone: branches[i].phone||'',
          sort: i, use_yn: true
        });
      }

      // app_users 생성
      await sb.insert('app_users', {
        id: oId, business_id: bizId,
        login_id: acct.loginId,
        password: acct.pw,
        name: acct.name.trim(),
        role: 'owner',
        branch_ids: JSON.stringify(brIds),
        view_branch_ids: JSON.stringify(brIds)
      });

      setStep(3);
      setTimeout(()=>onComplete({
        id:oId, businessId:bizId, loginId:acct.loginId, pw:acct.pw,
        name:acct.name.trim(), role:'owner', branchIds:brIds, viewBranchIds:brIds
      }), 2000);
    } catch(e) {
      alert('가입 실패: '+(e.message||'다시 시도해주세요.'));
    } finally { setSaving(false); }
  };

  const inp = {width:'100%',padding:'11px 13px',fontSize:T.fs.md,borderRadius:T.radius.lg,border:'1px solid '+T.border,outline:'none',fontFamily:'inherit',color:T.text,background:'#fff'};
  const lbl = {fontSize:T.fs.xxs,color:T.gray500,fontWeight:T.fw.bold,marginBottom:5,display:'block'};
  const errStyle = {fontSize:T.fs.xxs,color:T.danger,marginTop:3};

  /* ── STEP 인디케이터 ── */
  const StepBar = () => (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',marginBottom:24,gap:0}}>
      {[['1','계정'],['2','사업장'],['3','완료']].map(([n,lv],i,arr)=><>
        <div key={n} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:5}}>
          <div style={{width:28,height:28,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:12,fontWeight:700,
            background: step>i+1?T.primary : step===i+1?T.primary:'#e8e8f0',
            color: step>=i+1?'#fff':T.gray400,
            boxShadow: step===i+1?'0 0 0 4px #f0f0fa':'none',
            transition:'all .3s'}}>
            {step>i+1?'✓':n}
          </div>
          <div style={{fontSize:10,fontWeight:600,color:step===i+1?T.primary:T.gray400}}>{lv}</div>
        </div>
        {i<2&&<div style={{width:44,height:2,background:step>i+1?T.primary:'#e8e8f0',margin:'0 6px',marginBottom:16,transition:'background .3s'}}/>}
      </>)}
    </div>
  );

  /* ── STEP 1: 계정 만들기 ── */
  if (step===1) return (
    <div style={{display:'flex',flexDirection:'column',gap:0}}>
      <StepBar/>
      <div style={{fontSize:T.fs.lg,fontWeight:T.fw.black,marginBottom:4}}>계정 만들기</div>
      <div style={{fontSize:T.fs.sm,color:T.textMuted,marginBottom:20,lineHeight:1.5}}>아이디와 비밀번호로 Bliss 계정을 만들어요.</div>
      <div style={{marginBottom:13}}>
        <label style={lbl}>이름</label>
        <input style={{...inp,borderColor:errs.name?T.danger:T.border}} value={acct.name} onChange={e=>setA('name',e.target.value)} placeholder="홍길동"/>
        {errs.name&&<div style={errStyle}>{errs.name}</div>}
      </div>
      <div style={{marginBottom:13}}>
        <label style={lbl}>아이디 (영문/숫자/언더바 3~20자)</label>
        <input style={{...inp,borderColor:errs.loginId?T.danger:T.border}} value={acct.loginId} onChange={e=>setA('loginId',e.target.value.toLowerCase())} placeholder="예: housewaxing"/>
        {errs.loginId&&<div style={errStyle}>{errs.loginId}</div>}
      </div>
      <div style={{marginBottom:13}}>
        <label style={lbl}>비밀번호</label>
        <input style={{...inp,borderColor:errs.pw?T.danger:T.border}} type="password" value={acct.pw} onChange={e=>setA('pw',e.target.value)} placeholder="4자 이상"/>
        {errs.pw&&<div style={errStyle}>{errs.pw}</div>}
      </div>
      <div style={{marginBottom:20}}>
        <label style={lbl}>비밀번호 확인</label>
        <input style={{...inp,borderColor:errs.pw2?T.danger:T.border}} type="password" value={acct.pw2} onChange={e=>setA('pw2',e.target.value)} placeholder="비밀번호 재입력"/>
        {errs.pw2&&<div style={errStyle}>{errs.pw2}</div>}
      </div>
      <button onClick={nextStep1} style={{width:'100%',padding:13,borderRadius:T.radius.lg,border:'none',background:T.primary,color:'#fff',fontSize:T.fs.md,fontWeight:T.fw.bolder,cursor:'pointer',fontFamily:'inherit'}}>
        다음 — 사업장 등록 →
      </button>
      <button onClick={onBack} style={{background:'none',border:'none',fontSize:T.fs.sm,color:T.gray400,cursor:'pointer',marginTop:12,fontFamily:'inherit'}}>← 로그인으로 돌아가기</button>
    </div>
  );

  /* ── STEP 2: 사업장 등록 ── */
  if (step===2) return (
    <div style={{display:'flex',flexDirection:'column',gap:0}}>
      <StepBar/>
      <div style={{fontSize:T.fs.lg,fontWeight:T.fw.black,marginBottom:4}}>사업장 등록</div>
      <div style={{fontSize:T.fs.sm,color:T.textMuted,marginBottom:16,lineHeight:1.5}}>운영하시는 브랜드명과 지점을 등록해주세요. 여러 지점을 운영하신다면 모두 추가할 수 있어요.</div>

      {/* 브랜드명 */}
      <div style={{marginBottom:16}}>
        <label style={lbl}>브랜드명 <span style={{color:T.danger}}>*</span></label>
        <input style={inp} value={bizName} onChange={e=>setBizName(e.target.value)} placeholder="예: 하우스왁싱"/>
      </div>

      {/* 지점 목록 */}
      <div style={{marginBottom:10,display:'flex',flexDirection:'column',gap:8}}>
        {branches.map((b,i)=>(
          <div key={i} style={{border:'1.5px solid '+(i===0?T.primary:T.border),borderRadius:T.radius.lg,padding:'12px 14px',background:i===0?T.primaryHover:'#fff',position:'relative'}}>
            <div style={{fontSize:10,fontWeight:800,color:T.primary,marginBottom:4}}>📍 지점 {i+1}</div>
            <div style={{fontSize:T.fs.sm,fontWeight:T.fw.bolder,color:T.text}}>{b.name}</div>
            {b.phone&&<div style={{fontSize:T.fs.xxs,color:T.textSub,marginTop:2}}>{b.phone}</div>}
            {i>0&&<button onClick={()=>removeBranch(i)} style={{position:'absolute',top:8,right:10,background:'none',border:'none',cursor:'pointer',color:T.gray400,fontSize:16}} onMouseOver={e=>e.currentTarget.style.color=T.danger} onMouseOut={e=>e.currentTarget.style.color=T.gray400}>✕</button>}
          </div>
        ))}
      </div>

      {/* 추가 폼 */}
      {showAddForm ? (
        <div style={{border:'1.5px solid '+T.border,borderRadius:T.radius.lg,padding:'14px',marginBottom:10,background:'#fafafa'}}>
          <div style={{fontSize:T.fs.xs,fontWeight:T.fw.bolder,marginBottom:10,color:T.text}}>지점 등록</div>
          <div style={{marginBottom:10}}>
            <label style={lbl}>지점 이름 <span style={{color:T.danger}}>*</span></label>
            <input style={{...inp,borderColor:errs.addName?T.danger:T.border}} value={addName} onChange={e=>{setAddName(e.target.value);setErr('addName','')}} placeholder="예: 강남점"/>
            {errs.addName&&<div style={errStyle}>{errs.addName}</div>}
          </div>
          <div style={{marginBottom:12}}>
            <label style={lbl}>전화번호 (선택)</label>
            <input style={inp} value={addPhone} onChange={e=>setAddPhone(e.target.value)} placeholder="02-0000-0000"/>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={addBranchItem} style={{flex:1,padding:'10px',borderRadius:T.radius.lg,border:'none',background:T.primary,color:'#fff',fontSize:T.fs.sm,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>등록</button>
            <button onClick={()=>{setShowAddForm(false);setAddName('');setAddPhone('');setErr('addName','');}} style={{padding:'10px 16px',borderRadius:T.radius.lg,border:'1px solid '+T.border,background:'#fff',color:T.gray600,fontSize:T.fs.sm,cursor:'pointer',fontFamily:'inherit'}}>취소</button>
          </div>
        </div>
      ) : (
        branches.length < 3 && (
          <button onClick={()=>setShowAddForm(true)} style={{width:'100%',padding:11,border:'1.5px dashed #ccc',borderRadius:T.radius.lg,background:'none',color:T.textMuted,fontSize:T.fs.sm,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6,marginBottom:10,fontFamily:'inherit'}}>
            ＋ {`지점 등록 (${branches.length}/3)`}
          </button>
        )
      )}

      <div style={{fontSize:T.fs.xxs,color:T.textMuted,textAlign:'center',marginBottom:14}}>지점은 최대 <b style={{color:T.primary}}>3개</b>까지 등록할 수 있어요</div>

      <button onClick={submit} disabled={saving||branches.length===0||!bizName.trim()}
        style={{width:'100%',padding:13,borderRadius:T.radius.lg,border:'none',
          background:(saving||branches.length===0||!bizName.trim())?T.gray200:'linear-gradient(135deg,#7c7cc8,#9b9be0)',
          color:(saving||branches.length===0||!bizName.trim())?T.gray400:'#fff',
          fontSize:T.fs.md,fontWeight:T.fw.bolder,cursor:saving||branches.length===0?'not-allowed':'pointer',fontFamily:'inherit'}}>
        {saving?'처리 중...':'완료 — 시작하기 →'}
      </button>
      <button onClick={()=>setStep(1)} style={{background:'none',border:'none',fontSize:T.fs.sm,color:T.gray400,cursor:'pointer',marginTop:10,fontFamily:'inherit'}}>← 이전</button>
    </div>
  );

  /* ── STEP 3: 완료 ── */
  return (
    <div style={{textAlign:'center',padding:'20px 0',display:'flex',flexDirection:'column',alignItems:'center',gap:16}}>
      <div style={{fontSize:56,animation:'bounceIn .6s ease'}}>🎉</div>
      <div style={{fontSize:T.fs.xxl,fontWeight:T.fw.black,color:T.successDk}}>가입 완료!</div>
      <div style={{fontSize:T.fs.sm,color:T.gray600,lineHeight:1.8}}>
        <b style={{color:T.text}}>{acct.name}</b>님,<br/>14일 무료 체험이 시작되었습니다.
      </div>
      <div style={{width:'60%',height:4,background:'#e0e0f0',borderRadius:T.radius.sm,overflow:'hidden'}}>
        <div style={{height:'100%',background:T.primary,borderRadius:T.radius.sm,animation:'loadingBar 1.8s linear forwards'}}/>
      </div>
    </div>
  );
}


// ─── Super: 시스템 설정 ───
function SuperSystemSettings() {
  const [key, setKey]     = useState("");
  const [saved, setSaved] = useState(false);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    (async () => {
      try {
        const rows = await sb.get("businesses","&code=eq.__system__");
        if (rows.length > 0) {
          const m = JSON.parse(rows[0].settings||"{}");
          setKey(m.system_gemini_key||"");
        }
      } catch(e){}
      finally { setLoading(false); }
    })();
  }, []);

function MiniCal({ selDate, onSelect, onClose }) {
  const [viewDate, setViewDate] = useState(() => {
    const d = new Date(selDate); return { y: d.getFullYear(), m: d.getMonth() };
  });
  const ref = useRef(null);
  useEffect(() => {
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) onClose(); };
    document.addEventListener("mousedown", h); document.addEventListener("touchstart", h);
    return () => { document.removeEventListener("mousedown", h); document.removeEventListener("touchstart", h); };
  }, [onClose]);
  const { y, m } = viewDate;
  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const today = todayStr();
  const weeks = [];
  let week = Array(firstDay).fill(null);
  for (let d = 1; d <= daysInMonth; d++) {
    week.push(d);
    if (week.length === 7) { weeks.push(week); week = []; }
  }
  if (week.length) { while (week.length < 7) week.push(null); weeks.push(week); }
  const prevM = () => setViewDate(v => v.m === 0 ? { y: v.y - 1, m: 11 } : { ...v, m: v.m - 1 });
  const nextM = () => setViewDate(v => v.m === 11 ? { y: v.y + 1, m: 0 } : { ...v, m: v.m + 1 });
  const dayNames = ["일","월","화","수","목","금","토"];
  useEffect(() => {
    if (ref.current) {
      const rect = ref.current.getBoundingClientRect();
      if (rect.right > window.innerWidth - 8) ref.current.style.left = "auto";
      if (rect.right > window.innerWidth - 8) ref.current.style.right = "0";
      if (rect.right > window.innerWidth - 8) ref.current.style.transform = "none";
      if (rect.left < 8) { ref.current.style.left = "0"; ref.current.style.transform = "none"; }
    }
  }, []);
  return <div ref={ref} style={{position:"absolute",top:"100%",left:"50%",transform:"translateX(-50%)",zIndex:100,background:T.bgCard,border:"1px solid #d0d0d0",borderRadius:T.radius.md,boxShadow:"0 8px 24px rgba(0,0,0,.15)",padding:10,width:250,marginTop:4}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
      <button onClick={prevM} style={{background:"none",border:"none",cursor:"pointer",padding:4,color:T.gray600}}><I name="chevL" size={14}/></button>
      <span style={{fontSize:T.fs.sm,fontWeight:T.fw.bolder,color:T.text}}>{y}년 {m+1}월</span>
      <button onClick={nextM} style={{background:"none",border:"none",cursor:"pointer",padding:4,color:T.gray600}}><I name="chevR" size={14}/></button>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1,textAlign:"center"}}>
      {dayNames.map((dn,i) => <div key={dn} style={{fontSize:T.fs.xs,fontWeight:T.fw.bold,color:i===0?T.female:i===6?T.primary:T.gray500,padding:"2px 0"}}>{dn}</div>)}
      {weeks.flat().map((d, i) => {
        if (!d) return <div key={"e"+i}/>;
        const ds = `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
        const isSel = ds === selDate;
        const isToday = ds === today;
        const dow = new Date(y, m, d).getDay();
        return <button key={i} onClick={() => onSelect(ds)} style={{
          width:30,height:30,margin:"1px auto",borderRadius:"50%",border:isToday&&!isSel?"1.5px solid #7c7cc8":"none",
          background:isSel?T.primary:"transparent",color:isSel?T.bgCard:dow===0?T.female:dow===6?T.primary:T.text,
          fontSize:T.fs.sm,fontWeight:isSel||isToday?700:400,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"
        }}>{d}</button>;
      })}
    </div>
  </div>;
}

function Timeline({ data, setData, userBranches, viewBranches=[], isMaster, currentUser, setPage, bizId, onMenuClick, bizName, pendingOpenRes, setPendingOpenRes, naverColShow={}, scraperStatus=null }) {
  // 타임라인 블록 표시 항목 — App에서 prop으로 받음
  const effectiveNaverColShow = naverColShow;
  const SVC_LIST = (data?.services || []).slice().sort((a,b)=>(a.sort||0)-(b.sort||0));
  const PROD_LIST = (data?.products || []);
  const [selDate, setSelDate] = useState(todayStr());
  const [schHistory, setSchHistory] = useState(null);
  // 직원 당일 지점 오버라이드: {empId_date: branchId}
  const [empBranchOverride, setEmpBranchOverride] = useState({});

  // 직원-지점 매핑
  const SCH_BRANCH_MAP = {"nonhyeon":"br_4bcauqvrb","gang":"br_4bcauqvrb","hongdae":"br_l6yzs2pkq","yongsan":"br_ybo3rmulv","jamsil":"br_lfv2wgdf1","cheonho":"br_xu60omgdf","wirye":"br_g768xdu4w","wangsimni":"br_wkqsxj6k1","magok":"br_k57zpkbx1"};
  const BASE_EMP_LIST = [
    {id:"소연",branch:"nonhyeon"},{id:"경아",branch:"nonhyeon"},{id:"수연",branch:"nonhyeon"},{id:"서현",branch:"nonhyeon"},
    {id:"지은",branch:"hongdae"},{id:"현아",branch:"hongdae"},{id:"혜경",branch:"hongdae"},{id:"민아",branch:"hongdae"},
    {id:"보령",branch:"yongsan"},{id:"희서",branch:"yongsan"},{id:"민정",branch:"yongsan"},
    {id:"유라",branch:"jamsil"},{id:"소이",branch:"jamsil"},{id:"다해",branch:"jamsil"},
    {id:"미진",branch:"cheonho"},{id:"수민",branch:"cheonho"},
    {id:"재윤",branch:"male"},{id:"주용",branch:"male"},
  ];

  // schHistory 파싱 함수
  const parseSchHistory = (val) => {
    const merged = {};
    Object.values(val).forEach(monthData => {
      if (typeof monthData !== "object") return;
      Object.entries(monthData).forEach(([emp, days]) => {
        if (emp.startsWith("__")) return;
        if (!merged[emp]) merged[emp] = {};
        Object.assign(merged[emp], days);
      });
    });
    return merged;
  };

  // 내일 날짜 스냅샷 (10시 이후 lock용)
  const [frozenTomorrow, setFrozenTomorrow] = useState(null); // {empId:{date:status}} - 내일 데이터 고정본

  // 10시 이후 내일 날짜가 lock되는지 체크
  const isTomorrowLocked = () => new Date().getHours() >= 22;
  const getTomorrowStr = () => {
    const d = new Date(); d.setDate(d.getDate()+1);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  };

  // schHistory에서 내일 데이터만 추출
  const extractTomorrowData = (sch) => {
    const tom = getTomorrowStr();
    const snap = {};
    Object.entries(sch).forEach(([emp, days]) => {
      if (days[tom] !== undefined) { if (!snap[emp]) snap[emp] = {}; snap[emp][tom] = days[tom]; }
    });
    return snap;
  };

  // Realtime 업데이트 시 lock 날짜 보존하며 merge
  const mergeWithLock = (newSch) => {
    if (!isTomorrowLocked() || !frozenTomorrow) return newSch;
    const tom = getTomorrowStr();
    const merged = { ...newSch };
    // 내일 날짜는 frozenTomorrow 값으로 복원

  const setStatusClr = (k,v) => { setStatusClrRaw(p => { const n = {...p,[k]:v}; dbTl.current = {...dbTl.current, sc:n}; tlSaveLocal(dbTl.current); try{localStorage.setItem("tl_sc",JSON.stringify(n))}catch(e){} return n; }); };
  // Sync status colors to localStorage for other components using getStatusClr()
  useEffect(() => { try{localStorage.setItem("tl_sc",JSON.stringify(statusClr))}catch(e){} }, [statusClr]);
  const slotsPerHour = 60 / timeUnit;
  const totalRows = (endHour - startHour) * slotsPerHour;
  const headerH = 40;

  // CSS grid background
  const hourH = rowH * slotsPerHour;
  const halfH = rowH * (slotsPerHour / 2);
  const gridBg = useMemo(() => ({
    backgroundImage: [
      `repeating-linear-gradient(to bottom, #e8e8e8 0px, #e8e8e8 1px, transparent 1px, transparent ${hourH}px)`,
      ...(slotsPerHour >= 2 ? [`repeating-linear-gradient(to bottom, #f0f0f0 0px, #f0f0f0 1px, transparent 1px, transparent ${halfH}px)`] : []),
      ...(slotsPerHour > 2 ? [`repeating-linear-gradient(to bottom, #f5f5f5 0px, #f5f5f5 1px, transparent 1px, transparent ${rowH}px)`] : []),
    ].join(","),
    backgroundSize: "100% 100%",
  }), [rowH, hourH, halfH, slotsPerHour]);

  // Time label positions
  const timeLabels = useMemo(() => {
    const labels = [];
    for (let i = 0; i < totalRows; i++) {
      const totalMin = i * timeUnit;
      const h = startHour + Math.floor(totalMin / 60);
      const m = totalMin % 60;
      const isHour = m === 0;
      const ampm = h < 12 ? "오전" : "오후";
      const h12 = h <= 12 ? h : h - 12;
      const isMob = window.innerWidth <= 768;
      labels.push({ i, isHour, m, text: isHour ? (isMob ? `${h12}:00` : `${ampm} ${String(h12).padStart(2,"0")}:00`) : `${String(m).padStart(2,"0")}` });
    }
    return labels;
  }, [startHour, endHour, timeUnit, totalRows]);

  const timeToY = (timeStr) => {
    const [h, m] = timeStr.split(":").map(Number);
    return ((h - startHour) * 60 + m) / timeUnit * rowH;
  };

  const yToTime = (y) => {
    const totalMin = Math.floor(y / rowH) * timeUnit;
    const h = startHour + Math.floor(totalMin / 60);

  };

  const lastTouchCell = useRef(0);
  const handleCellClick = (room, y) => {
    if (isDragging.current || isResizing.current) return;
    if (!canEdit(room.branch_id)) return;
    if (room.isNaver) return;
    // 모바일: 터치 직후 click 무시 (롱프레스로만 등록)
    if (Date.now() - lastTouchCell.current < 500) return;
    const time = yToTime(y);
    setModalData({ roomId: room.isStaffCol ? "" : room.id, bid: room.branch_id, time, date: selDate, staffId: room.isStaffCol ? room.staffId : undefined });

  };

  const handleBlockClick = async (block, e) => {
    e.stopPropagation();
    if (isDragging.current || isResizing.current) return;
    const readOnly = !canEdit(block.bid);
    let freshBlock = block;
    try {
      if (block.id) {
        const rows = await sb.get("reservations", block.id);
        if (rows && rows.id) {
          const parsed = fromDb("reservations", [rows])[0];
          freshBlock = {...block, ...parsed};
          setData(prev => prev ? {...prev, reservations: (prev.reservations||[]).map(r => r.id === parsed.id ? {...r, ...parsed} : r)} : prev);
        }
      }
    } catch(e) { console.warn("fresh fetch err:", e); }
    setModalData({ ...freshBlock, readOnly });
    setShowModal(true);

  const handleSave = (item) => {
    // 필수값 검증
    if (!item.isSchedule && item.type === "reservation" && !item.custName?.trim()) {
      alert("고객 이름을 입력해 주세요."); return;
    }
    // 신규고객이면 DB에 고객 등록
    if (item.isNewCust && item.custName && !item.custId) {
      const newCustId = "cust_" + uid();
      item.custId = newCustId;
      const newCust = {
        id: newCustId, bid: item.bid, name: item.custName, phone: (item.custPhone || "").replace(/[^0-9]/g, ""),
        gender: item.custGender || "", visits: 0, lastVisit: null, memo: "",
        custNum: ""
      };
      setData(prev => ({ ...prev, customers: [...prev.customers, newCust] }));
      sb.insert("customers", toDb("customers", newCust)).catch(console.error);
    }
    const allItems = [];
    const isNewItem = !data?.reservations?.find(r => r.id === item.id);
    const isExistItem = !isNewItem;
    setData(prev => {
      const exists = (prev?.reservations||[]).find(r => r.id === item.id);
      if (exists) {
        const updateRow = toDb("reservations", item);
        if (!updateRow.reservation_id) updateRow.reservation_id = null;
        sb.update("reservations", item.id, updateRow).catch(console.error);
        return { ...prev, reservations: (prev?.reservations||[]).map(r => r.id === item.id ? item : r) };
      }
      const items = [item];
      if (item.isSchedule && item.repeat && item.repeat !== "none" && item.repeatUntil) {
        const fmtD = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
        const start = new Date(item.date + "T12:00:00");
        const end = new Date(item.repeatUntil + "T12:00:00");
        const dayOfWeek = start.getDay();
        const dayOfMonth = start.getDate();
        let cur = new Date(start);
        cur.setDate(cur.getDate() + 1);
        while (cur <= end) {
          let match = false;
          if (item.repeat === "daily") match = true;
          else if (item.repeat === "weekly") match = cur.getDay() === dayOfWeek;
          else if (item.repeat === "monthly") match = cur.getDate() === dayOfMonth;
          if (match) {
            const ds = fmtD(cur);
            items.push({ ...item, id: uid(), date: ds, endDate: ds, repeat: item.repeat, repeatUntil: item.repeatUntil, repeatSourceId: item.id });
          }
          cur.setDate(cur.getDate() + 1);
        }
      }
      allItems.push(...items);
      return { ...prev, reservations: [...prev.reservations, ...items] };
    });
    // Async sync to Supabase
    setTimeout(()=>{
      if(allItems.length) sb.upsert("reservations", allItems.map(i=>{
        const row = toDb("reservations", i);
        if (!row.reservation_id) row.reservation_id = null; // 수동등록 시 null 명시
        return row;
      })).catch(console.error);
    }, 0);
    // 알림톡 신규 등록 팝업

      setAlimtalkConfirm({...item, _alimtalkType: "confirm"});

    // 알림톡 변경 팝업 (isExistItem이고 고객 전화번호 있을 때)

    }
    setShowModal(false); setModalData(null);
  };

  // ── Delete with repeat options ──
  const [deletePopup, setDeletePopup] = useState(null);
  const [alimtalkConfirm, setAlimtalkConfirm] = useState(null); // {item} 저장 후 알림톡 발송 여부 팝업

  const handleDeleteRequest = (block) => {
    const sourceId = block.repeatSourceId || block.id;
    const hasRepeat = (data.reservations || []).some(r => r.repeatSourceId === sourceId || (r.id === sourceId && r.repeat && r.repeat !== "none"));
    if (hasRepeat) {
      setDeletePopup(block);
    } else {
      handleDelete(block.id);
    }
  };

  const handleDeleteConfirm = (mode) => {
    if (!deletePopup) return;

    setData(prev => {
      let res = prev.reservations;
      if (mode === "this") {
        toDelIds.push(block.id);
        res = res.filter(r => r.id !== block.id);
      } else if (mode === "future") {
        res = res.filter(r => {
          if (r.id === block.id) { toDelIds.push(r.id); return false; }
          const sameGroup = r.id === sourceId || r.repeatSourceId === sourceId;
          if (sameGroup && r.date >= block.date) { toDelIds.push(r.id); return false; }
          return true;
        });
      } else if (mode === "all") {
        res.forEach(r => { if(r.id===sourceId||r.repeatSourceId===sourceId) toDelIds.push(r.id); });
        res = res.filter(r => r.id !== sourceId && r.repeatSourceId !== sourceId);

  const handleDragStart = (block, e) => {
    e.stopPropagation();
    const isTouch = e.type === "touchstart";
    if (!isTouch) e.preventDefault();
    const startPt = isTouch ? e.touches[0] : e;
    dragStartRef.current = { x: startPt.clientX, y: startPt.clientY };
    isDragging.current = false;
    longPressActive.current = false;

    const blockTopY = timeToY(block.time);
    let clickOffsetY = 0;
    if (sr) {
      const rect = sr.getBoundingClientRect();
      const cursorGridY = (startPt.clientY - rect.top + sr.scrollTop);
      clickOffsetY = cursorGridY - blockTopY;
    }

      const pt = getPoint(ev);

      if (!sr) return;
      const rect = sr.getBoundingClientRect();
      const x = pt.clientX - rect.left + sr.scrollLeft;
      const y = pt.clientY - rect.top + sr.scrollTop;
      setDragPos({ x: pt.clientX - rect.left, y: pt.clientY - rect.top });
      const colX = x - timeLabelsW;
      const roomIdx = Math.max(0, Math.min(allRooms.length - 1, Math.floor(colX / colW)));
      const targetRoom = allRooms[roomIdx];
      const gridY = y - clickOffsetY;
      const snappedTime = yToTime(Math.max(0, gridY));
      setDragSnap({ roomId: targetRoom?.id, bid: targetRoom?.branch_id, time: snappedTime });
      dragSnapRef.current = { roomId: targetRoom?.id, bid: targetRoom?.branch_id, time: snappedTime };
      const edgeZone = 40;
      if (pt.clientY - rect.top < edgeZone) sr.scrollTop -= 8;
      if (rect.bottom - pt.clientY < edgeZone) sr.scrollTop += 8;
    };

    const onDragUp = () => {
      document.removeEventListener(isTouch ? "touchmove" : "mousemove", onDragMove);
      document.removeEventListener(isTouch ? "touchend" : "mouseup", onDragUp);
      if (isDragging.current && dragSnapRef.current) {
        const snap = dragSnapRef.current;
        const orig = origBlockPos.current;
        if (snap.time !== orig.time || snap.roomId !== orig.roomId) {
          setData(prev => ({...prev, reservations: (prev?.reservations||[]).map(r => {
            if (r.id !== block.id) return r;
            const [sh,sm] = snap.time.split(":").map(Number);
            const endMin = sh*60+sm+(r.dur||60);
            const endTime = `${String(Math.floor(endMin/60)).padStart(2,"0")}:${String(endMin%60).padStart(2,"0")}`;
            const isNaverBlock = !!r.reservationId;
            const toNaverCol = snap.roomId?.startsWith("nv_");
            const toRegularCol = snap.roomId && !snap.roomId.startsWith("nv_");
            const targetRoom = allRooms.find(rm => rm.id === snap.roomId);
            const staffUpdate = isNaverBlock
              ? (toNaverCol ? { staffId: "", roomId: "" }
                : toRegularCol
                  ? (targetRoom?.isStaffCol
                      ? { staffId: targetRoom.staffId, roomId: snap.roomId }  // 직원컬럼 → staffId=직원명, roomId=컬럼ID
                      : { staffId: snap.roomId, roomId: snap.roomId })        // 일반룸 → 기존 방식
                  : {})
              : {};
            return {...r, time: snap.time, endTime, roomId: snap.roomId||r.roomId, bid: snap.bid||r.bid, ...staffUpdate};
          })}));
          setPendingChange({ type: "move", block, data: snap, orig });
        }
      }
      setDragBlock(null); setDragPos(null); setDragSnap(null); dragSnapRef.current = null;
      setTimeout(() => { isDragging.current = false; longPressActive.current = false; }, 300);
    };

    if (isTouch) {
      // 터치: 롱프레스 성공 후에만 document 리스너 등록
      const cancelOnMove = (ev) => {
        const pt = ev.touches[0]; if (!pt) return;
        if (Math.abs(pt.clientX - startPt.clientX) + Math.abs(pt.clientY - startPt.clientY) > 8) {
          clearTimeout(longPressTimer.current);
          document.removeEventListener("touchmove", cancelOnMove);
          document.removeEventListener("touchend", cancelOnEnd);
        }
      };
      const cancelOnEnd = () => {
        clearTimeout(longPressTimer.current);
        document.removeEventListener("touchmove", cancelOnMove);
        document.removeEventListener("touchend", cancelOnEnd);
      };
      document.addEventListener("touchmove", cancelOnMove); // passive(기본) → 스크롤 안 막음
      document.addEventListener("touchend", cancelOnEnd);

      longPressTimer.current = setTimeout(() => {
        document.removeEventListener("touchmove", cancelOnMove);
        document.removeEventListener("touchend", cancelOnEnd);
        longPressActive.current = true;
        isDragging.current = true;
        setDragBlock(block);
        try { navigator.vibrate && navigator.vibrate(30); } catch(ex){}
        // 이제 드래그 리스너 등록 (passive:false → 스크롤 차단)
        document.addEventListener("touchmove", onDragMove, {passive:false});
        document.addEventListener("touchend", onDragUp);
      }, 500);
    } else {
      // 마우스: 기존 방식
      const onMouseMove = (ev) => {
        const dx = ev.clientX - dragStartRef.current.x;
        const dy = ev.clientY - dragStartRef.current.y;
        if (!isDragging.current && Math.abs(dx) + Math.abs(dy) < 6) return;
        if (!isDragging.current) { isDragging.current = true; setDragBlock(block); }
        onDragMove(ev);
      };
      const onMouseUp = () => {
        document.removeEventListener("mousemove", onMouseMove);
        document.removeEventListener("mouseup", onMouseUp);
        onDragUp();
      };
      document.addEventListener("mousemove", onMouseMove);
      document.addEventListener("mouseup", onMouseUp);
    }
  };

  // ── Resize handler ──
  const handleResizeStart = (block, e) => {
    e.stopPropagation();
    const isTouch = e.type === "touchstart";
    if (!isTouch) e.preventDefault();
    const startY = isTouch ? e.touches[0].clientY : e.clientY;
    const startDur = block.dur;
    const origDur = block.dur;

    const onResizeMove = (ev) => {
      const pt = isTouch ? ev.touches[0] : ev;
      if (!pt) return;
      if (isTouch) ev.preventDefault();
      const dy = pt.clientY - startY;
      const durDelta = Math.round(dy / rowH) * timeUnit;
      const newDur = Math.max(5, startDur + durDelta);
      setResizeDur(newDur);
      resizeDurRef.current = newDur;
    };

    const onResizeUp = () => {
      document.removeEventListener(isTouch ? "touchmove" : "mousemove", onResizeMove);
      document.removeEventListener(isTouch ? "touchend" : "mouseup", onResizeUp);
      const finalDur = resizeDurRef.current;
      if (isResizing.current && finalDur !== origDur) {
        setData(prev => ({...prev, reservations: (prev?.reservations||[]).map(r => {
          if (r.id !== block.id) return r;
          const [sh,sm] = r.time.split(":").map(Number);
          const endMin = sh*60+sm+finalDur;
          const endTime = `${String(Math.floor(endMin/60)).padStart(2,"0")}:${String(endMin%60).padStart(2,"0")}`;
          return {...r, dur: finalDur, endTime};
        })}));
        setPendingChange({ type: "resize", block, data: { dur: finalDur }, orig: { dur: origDur } });
      }
      setResizeBlock(null); setResizeDur(0);
      setTimeout(() => { isResizing.current = false; longPressActive.current = false; }, 300);
    };

    const beginResize = () => {
      longPressActive.current = true;
      isResizing.current = true;
      setResizeBlock(block);
      setResizeDur(block.dur);
      resizeDurRef.current = block.dur;
      try { navigator.vibrate && navigator.vibrate(30); } catch(ex){}
      document.addEventListener(isTouch ? "touchmove" : "mousemove", onResizeMove, isTouch ? {passive:false} : undefined);
      document.addEventListener(isTouch ? "touchend" : "mouseup", onResizeUp);
    };

    if (isTouch) {
      const cancelOnMove = (ev) => {
        const pt = ev.touches[0]; if (!pt) return;
        if (Math.abs(pt.clientY - startY) > 8) {

          document.removeEventListener("touchmove", cancelOnMove);
          document.removeEventListener("touchend", cancelOnEnd);
        }
      };
      const cancelOnEnd = () => {
        clearTimeout(longPressTimer.current);
        document.removeEventListener("touchmove", cancelOnMove);
        document.removeEventListener("touchend", cancelOnEnd);
      };
      document.addEventListener("touchmove", cancelOnMove);
      document.addEventListener("touchend", cancelOnEnd);
      longPressTimer.current = setTimeout(() => {
        document.removeEventListener("touchmove", cancelOnMove);
        document.removeEventListener("touchend", cancelOnEnd);
        beginResize();
      }, 500);
    } else {
      beginResize();
    }
  };

  // ── 이동/리사이즈 확인/취소 ──
  // empMovePopup 닫기 핸들러는 전체 클릭으로 처리
  const confirmChange = (sendAlimtalkFlag) => {
    if (!pendingChange) return;
    const { type, block, data: d } = pendingChange;
    // 이미 미리보기로 state에 반영됨 → DB만 저장
    if (type === "move") {
      const r = (data?.reservations||[]).find(r => r.id === block.id);

        const rsvUrl = rsvUrlId ? "https://jeongwoolee1.github.io/bliss/r.html?"+encodeURIComponent(rsvUrlId) : "";
        sendAlimtalk("rsv_change", block.custPhone, {
          "#{사용자명}":branch?.name||"", "#{날짜}":r?.date||block.date||"", "#{시간}":r?.time||block.time||"",
          "#{작업자}":r?.worker||"", "#{작업장소}":branch?.name||"",
          "#{대표전화번호}":branch?.phone||"", "#{예약URL}":rsvUrl
        }, (typeof branch?.notiConfig==="string"?JSON.parse(branch?.notiConfig)||{}:branch?.notiConfig||{}), branch?.id);
      } catch(e) { console.warn("알림톡 변경:", e); }

    setPendingChange(null);

  const cancelChange = () => {
    if (!pendingChange) return;
    const { type, block, orig } = pendingChange;
    // 원래 위치로 복원
    if (type === "move") {
      setData(prev => ({...prev, reservations: (prev?.reservations||[]).map(r => {
        if (r.id !== block.id) return r;
        const [sh,sm] = orig.time.split(":").map(Number);

      setData(prev => ({...prev, reservations: (prev?.reservations||[]).map(r => {
        if (r.id !== block.id) return r;

        const endMin = sh*60+sm+orig.dur;

  const changeDate = (off) => { const d = new Date(selDate); d.setDate(d.getDate()+off); setSelDate(fmtLocal(d)); };

  useEffect(() => {
    if (scrollRef.current) {

        </div>;

        return <div style={{background:T.orangeLt,borderBottom:"1px solid #FFB74D",padding:"6px 12px",display:"flex",alignItems:"center",gap:T.sp.sm,flexShrink:0,cursor:"pointer",animation:"pendingBlink 2s infinite",width:"100%",boxSizing:"border-box"}}
          onClick={()=>{
            if (pendingList.length === 0) return;

            pendingClickIdx.current = idx + 1;
            setSelDate(target.date);
            setTimeout(()=>{
              if(!scrollRef.current) return;
              const rid = target.reservationId || target.id;

                const stickyW = window.innerWidth <= 768 ? 52 : 88;
                const visibleH = sr.clientHeight - stickyH;

                sr.scrollTo({

                  left: Math.max(0, elLeft - stickyW - visibleW / 2 + rect.width / 2),

          <div style={{flex:1,minWidth:0}}>

          {(() => {

          <button onClick={()=>setShowQuickBook(true)} style={{padding:"0 12px",height:32,fontSize:T.fs.sm,border:"none",borderRadius:T.radius.xl,background:"linear-gradient(135deg,#4285f4,#9b72cb,#d96570)",color:T.bgCard,cursor:"pointer",fontFamily:"inherit",flexShrink:0,display:"flex",alignItems:"center",gap:5,fontWeight:T.fw.bolder,boxShadow:"0 2px 8px rgba(66,133,244,.25)"}}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill={T.bgCard} style={{flexShrink:0}}><path d="M12 2L13.09 8.26L18 6L14.74 10.91L21 12L14.74 13.09L18 18L13.09 15.74L12 22L10.91 15.74L6 18L9.26 13.09L3 12L9.26 10.91L6 6L10.91 8.26L12 2Z"/></svg> AI Book
          </button>
          {/* 수동 새로고침 버튼 */}
          <button
            title="새로고침"
            onClick={async () => {
              if (isRefreshing) return;
              setIsRefreshing(true);
              if (pendingRTQueueRef.current.length > 0) {
                const queue = pendingRTQueueRef.current;
                pendingRTQueueRef.current = [];
                setRtPendingCount(0);
                setData(prev => {
                  if (!prev) return prev;
                  let reservations = [...(prev.reservations || [])];
                  for (const item of queue) {
                    if (item.ev === "UPDATE") reservations = reservations.map(r => r.id === item.data.id ? {...r, ...item.data} : r);
                    else if (item.ev === "INSERT") { if (!reservations.some(r => r.id === item.data.id)) reservations = [...reservations, item.data]; }
                    else if (item.ev === "DELETE") reservations = reservations.filter(r => r.id !== item.data.id);
                  }
                  return {...prev, reservations};
                });
              }
              // 직접 fetch하여 강제 갱신
              try {
                const rows = await sb.getByBiz("reservations", bizId);
                const parsed = fromDb("reservations", rows);
                setData(prev => prev ? {...prev, reservations: parsed} : prev);
              } catch(e) {}
              setTimeout(() => setIsRefreshing(false), 800);
            }}
            style={{
              position:"relative", width:32, height:32,
              border: rtPendingCount > 0 ? "1.5px solid #4285f4" : "1px solid #d0d0d0",
              borderRadius:T.radius.md, background: rtPendingCount > 0 ? "#e8f0fe" : T.bgCard,
              cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center",
              padding:0, color: rtPendingCount > 0 ? T.google : T.gray600,

              position:"absolute", top:-5, right:-5,

              borderRadius:"50%", width:16, height:16,

          </div>
          
        </div>

            const isSel = ds === selDate;
            const dayColor = dow===0?T.female:dow===6?T.male:T.gray700;
            return <button key={i} onClick={()=>setSelDate(ds)}
              style={{minWidth:42,height:32,borderRadius:T.radius.md,border:isSel?"none":"1px solid #e8e8e8",
                background:isSel?T.primary:T.bgCard,color:isSel?T.bgCard:dayColor,
                fontSize:T.fs.sm,fontWeight:isSel?700:500,cursor:"pointer",fontFamily:"inherit",padding:"2px 4px",flexShrink:0,
                display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",lineHeight:1.1}}>
              <span style={{fontSize:T.fs.sm}}>{DAYS_KR[dow]}</span>
              <span>{dt.getDate()}</span>
            </button>;
          })}
        </div>
      </div>



        {/* Timeline Grid */}
        <div style={{display:"flex",minWidth:"fit-content",position:"relative"}} onClick={handleTlClick}>
          {/* Time Labels */}

            <div style={{position:"relative",height:totalRows*rowH,...gridBg}}>
              {hoverCell && hoverCell.rowIdx>=0 && <div style={{position:"absolute",top:hoverCell.rowIdx*rowH,left:0,right:0,height:rowH,background:"rgba(124,124,200,0.08)",zIndex:1,pointerEvents:"none"}}/>}
              {timeLabels.map(({i, isHour, m, text}) => {
                const isHighlighted = hoverCell && hoverCell.rowIdx === i;
                return <div key={i} className="tl-time-cell" style={{position:"absolute",top:i*rowH,left:0,right:0,height:rowH,display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:window.innerWidth<=768?3:6}}>
                  <span style={{fontSize:isHour?(window.innerWidth<=768?10:11):(window.innerWidth<=768?8:9),fontWeight:isHighlighted?700:(isHour?600:400),color:isHighlighted?T.primary:(isHour?T.gray700:T.gray500),whiteSpace:"nowrap",lineHeight:1,transition:"color 0.1s"}}>{text}</span>
                </div>;
              })}
              {nowY > 0 && <div style={{position:"absolute",top:nowY-9,left:0,right:0,display:"flex",alignItems:"center",justifyContent:"center",zIndex:6,pointerEvents:"none"}}>
                <span style={{fontSize:T.fs.xs,fontWeight:T.fw.black,color:T.danger,background:T.bgCard,padding:"1px 3px",borderRadius:T.radius.sm,lineHeight:1}}>
                  {(now.getHours()>12?now.getHours()-12:now.getHours()||12)}:{String(now.getMinutes()).padStart(2,"0")}
                </span>
              </div>}
            </div>
          </div>

          {/* Room Columns */}
          {allRooms.map((room, ci) => {
            const roomBlocks = blocks.filter(b => {
              if (room.isNaver) {
                // 네이버 칼럼: 미배정(roomId 없거나 nv_ 접두) 네이버 예약만
                if (!isNaverRes(b) || b.bid !== room.branch_id) return false;
                if (b.roomId && !b.roomId.startsWith("nv_")) return false; // 일반 룸에 이미 배정됨
                return naverAssignments[b.id] === room.id;
              }
              if (room.isStaffCol) {
                // 직원 컬럼: staffId 일치 또는 roomId가 해당 staff col id
                if (b.bid !== room.branch_id) return false;
                if (b.staffId && b.staffId === room.staffId) return true;
                if (b.roomId === room.id) return true;
                // room_id 없는 네이버 예약도 naverAssignments로 배치
                if (isNaverRes(b) && !b.roomId && naverAssignments[b.id] === room.id) return true;
                return false;
              }
              // 일반 룸 칼럼: roomId 기준
              return b.roomId === room.id;
            });
            const isNewBranch = ci === 0 || room.branch_id !== allRooms[ci-1]?.branch_id;

            return (
              <div key={room.id} className="tl-room-col" data-branch-id={room.branch_id} style={{width:colW,flexShrink:0,borderLeft:room.isNaver?"2px solid #A5D6A7":(isNewBranch&&ci>0?"none":"1px solid #f0f0f0"),background:room.isNaver?T.successLt:(branchColor||T.bgCard),marginLeft:isNewBranch&&ci>0?4:0,boxShadow:isNewBranch&&ci>0?"-4px 0 8px rgba(0,0,0,.06)":room.isNaver?"inset 2px 0 4px rgba(76,175,80,.08)":"none"}}>
                {/* Room Header - sticky */}
                <div style={{height:headerH,borderBottom:"1px solid #eee",position:"sticky",top:topbarH,zIndex:10,background:room.isBlank?T.gray100:room.isNaver?T.successLt:(branchColor||T.bgCard),display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",lineHeight:1.2}}>

                        onClick={e=>{e.stopPropagation();setEmpMovePopup(p=>p?.empId===room.staffId?null:{empId:room.staffId,date:selDate,x:e.clientX,y:e.clientY});}}>
                        {room.name}
                      </span>
                      {empMovePopup?.empId===room.staffId && empMovePopup?.date===selDate && (
                        <div onClick={e=>e.stopPropagation()} style={{position:"fixed",left:Math.min(empMovePopup.x,window.innerWidth-200),top:empMovePopup.y+8,background:T.bgCard,borderRadius:12,boxShadow:"0 4px 24px rgba(0,0,0,.22)",zIndex:9999,padding:"10px 0 6px",minWidth:200}}>
                          <div style={{fontSize:11,color:T.textMuted,padding:"0 12px 8px",fontWeight:700,borderBottom:"1px solid "+T.border}}>
                            {room.name} 이동 설정
                          </div>
                          {/* 현재 segments */}
                          {(()=>{
                            const overrideKey = room.staffId+"_"+selDate;
                            const ov = empBranchOverride[overrideKey];
                            const segs = ov ? (typeof ov==="string" ? [{branchId:ov,from:null,until:null}] : (ov.segments||[])) : [];
                            const empBase = BASE_EMP_LIST.find(e=>e.id===room.staffId);
                            const baseBranch = empBase ? SCH_BRANCH_MAP[empBase.branch] : null;
                            const allBranches = (data.branches||[]).filter(b=>
                              branchesToShow.some(bs=>bs.id===b.id) || b.id===baseBranch
                            );
                            // 추가할 지점 + 시간 상태
                            const [addBranch,setAddBranch] = [empMovePopup.addBranch||"", v=>setEmpMovePopup(p=>({...p,addBranch:v}))];
                            const [addFrom,setAddFrom] = [empMovePopup.addFrom||"", v=>setEmpMovePopup(p=>({...p,addFrom:v}))];

                            const saveSeg = () => {
                              if(!addBranch) return;
                              const overrideKey2 = room.staffId+"_"+selDate;
                              const newSeg = {branchId:addBranch, from:addFrom||null, until:null};
                              // 기존 segs에서 같은 지점 제거 후 추가
                              const prev = segs.filter(s=>s.branchId!==addBranch);
                              let merged = [...prev, newSeg].sort((a,b)=>{
                                if(!a.from) return -1; if(!b.from) return 1;
                                return a.from.localeCompare(b.from);
                              }).map((s,i,arr)=>({...s, until: arr[i+1]?.from||null}));
                              // 원래 지점이 없으면 자동 추가 (첫 이동 전까지)
                              const empBase = BASE_EMP_LIST.find(e=>e.id===room.staffId);
                              const baseBranchId = empBase ? SCH_BRANCH_MAP[empBase.branch] : null;
                              if(baseBranchId && !merged.find(s=>s.branchId===baseBranchId)) {
                                const firstFrom = merged[0]?.from || null;
                                merged = [{branchId:baseBranchId, from:null, until:firstFrom}, ...merged];
                              }
                              setEmpBranchOverride(p=>({...p,[overrideKey2]:{segments:merged}}));
                              setEmpMovePopup(null);
                            };

                            const removeSeg = (branchId) => {
                              const overrideKey2 = room.staffId+"_"+selDate;
                              const newSegs = segs.filter(s=>s.branchId!==branchId);
                              if(newSegs.length===0) {
                                setEmpBranchOverride(p=>{const n={...p};delete n[overrideKey2];return n;});
                              } else {
                                const reindexed = newSegs.sort((a,b)=>(!a.from?-1:!b.from?1:a.from.localeCompare(b.from))).map((s,i,arr)=>({...s,until:arr[i+1]?.from||null}));
                                setEmpBranchOverride(p=>({...p,[overrideKey2]:{segments:reindexed}}));
                              }
                            };

                            return <>
                              {/* 현재 구간 목록 */}
                              {segs.length>0 && <div style={{padding:"6px 12px"}}>
                                {segs.map(s=>{
                                  const br = allBranches.find(b=>b.id===s.branchId);
                                  return <div key={s.branchId} style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,fontSize:12}}>

                                    <button onClick={()=>removeSeg(s.branchId)} style={{width:18,height:18,border:"none",background:"none",cursor:"pointer",color:T.danger,fontSize:14,padding:0,lineHeight:1}}>×</button>
                                  </div>;
                                })}
                              </div>}
