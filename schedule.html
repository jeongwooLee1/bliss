                  {ownerSaveStatus==="error" && <span style={{fontSize:11,color:"#c06060"}}>저장 실패</span>}
                  <button onClick={()=>{ saveOwnerReqs(ownerReqs); }}
                    style={{fontSize:11,padding:"4px 10px",borderRadius:6,border:"1px solid #c0a07a",background:"#fdf8f0",color:"#7a4a18",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>
                    💾 저장
                  </button>
                  <button onClick={()=>{ if(window.confirm("이번달 원장 휴무 설정을 초기화할까요?")){ const next={...ownerReqs}; Object.keys(next).forEach(k=>{if(k.includes("__"+curMonthStr)||k.includes("__"+nextMonthStr)) delete next[k];}); setOwnerReqs(next); saveOwnerReqs(next); }}}
                    style={{fontSize:11,padding:"4px 10px",borderRadius:6,border:"1px solid #ddd",background:T.bgCard,color:T.textMuted,cursor:"pointer",fontFamily:"inherit"}}>
                    🗑 초기화
                  </button>
                  <button onClick={()=>setShowOwnerSettings(false)}
                    style={{fontSize:16,lineHeight:1,padding:"2px 8px",borderRadius:6,border:"1px solid #ddd",background:"#f5f0ea",color:T.textSub,cursor:"pointer",fontFamily:"inherit"}}>
                    ✕
                  </button>
                </div>
              </div>
          <div style={{fontSize:12,color:T.textMuted,marginBottom:16}}>자동배치 전 원장님 고정 휴무일을 먼저 설정하세요. 요일 버튼으로 매주 반복 지정 또는 날짜 드래그로 개별 선택. 자동배치 시 최우선 적용됩니다.</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:14}}>
            {ALL_EMPLOYEES.filter(e=>e.isOwner).map(emp=>{
              const bc=BRANCHES.find(b=>b.id===emp.branch)?.color||T.textSub;
              const myReqs=Object.entries(ownerReqs).filter(([k])=>k.startsWith(emp.id+"__"));
              // 현재 이 원장의 활성 요일 구하기 (이번달+이월 날짜 기준)
              const activeDows = new Set(
                myReqs
                  .filter(([k,v])=>!!v && (k.includes("__"+curMonthStr)||k.includes("__"+nextMonthStr)))
                  .map(([k])=>{ const ds=k.split("__")[1]; const d=new Date(ds); return getDow0Mon(d.getFullYear(),d.getMonth(),d.getDate()); })
              );
              // 요일이 완전히 채워져 있는지 체크
              const isDowFull = (dow) => {
                const matchDays = days.filter(day=>!day.isNext && day.dow===dow);
                return matchDays.length>0 && matchDays.every(day=>!!ownerReqs[emp.id+"__"+day.ds]);
              };
              // 요일 토글: 해당 요일의 이번달 날짜 전체를 on/off
              const toggleDow = (dow) => {
                const full = isDowFull(dow);
                setOwnerReqs(p=>{
                  const next={...p};
                  days.filter(day=>!day.isNext && day.dow===dow).forEach(day=>{
                    const key=emp.id+"__"+day.ds;
                    if(full){ delete next[key]; } else { next[key]=STATUS.MUST_OFF; }
                  });
                  return next;
                });
              };
              return (
                <div key={emp.id} style={{border:`1.5px solid ${bc}55`,borderRadius:10,padding:12}}>
                  {/* 이름 행: 이름 + 반복 버튼 우측 정렬 */}
                  {(()=>{
                    const rep = ownerRepeat[emp.id] || {enabled:false, dows:[]};
                    const toggleRepeat = () => {
                      const activeDows_ = [];
                      for(let dow=0;dow<7;dow++){ if(isDowFull(dow)) activeDows_.push(dow); }
                      const newRep = {...ownerRepeat, [emp.id]: {enabled:!rep.enabled, dows:activeDows_}};
                      setOwnerRepeat(newRep);
                      saveOwnerRepeat(newRep);
                    };
                    const toggleDowWithRepeat = (dow) => {
                      const wasFullBefore = isDowFull(dow); // 토글 전 상태로 계산
                      toggleDow(dow);
                      if(rep.enabled){
                        // wasFullBefore: 토글 전에 full이었으면 → 이제 off → dows에서 제거
                        const newDows = wasFullBefore ? rep.dows.filter(d=>d!==dow) : [...new Set([...rep.dows,dow])];
                        const newRep={...ownerRepeat,[emp.id]:{...rep,dows:newDows}};
                        setOwnerRepeat(newRep); saveOwnerRepeat(newRep);
                      }
                    };
                    return (<>
                      {/* 이름 + 반복 버튼 한 줄 */}
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                        <div style={{fontWeight:700,fontSize:13,color:bc}}>{emp.name}</div>
                        <button onClick={toggleRepeat}
                          title="반복 ON: 매달 같은 요일 자동 휴무 지정"
                          style={{padding:"3px 10px",fontSize:11,fontWeight:700,borderRadius:5,border:`1.5px solid ${rep.enabled?"#e0a030":T.border}`,background:rep.enabled?"#fff8e8":T.bgCard,color:rep.enabled?"#c07000":T.textMuted,cursor:"pointer",fontFamily:"inherit",transition:"all .12s",whiteSpace:"nowrap"}}>
                          {rep.enabled?"🔁 반복중":"🔁 반복"}
                        </button>
                      </div>
                      {/* 요일 버튼 */}
                      <div style={{display:"flex",gap:4,marginBottom:10,alignItems:"center"}}>
                        {["일","월","화","수","목","금","토"].map((dn,di)=>{ const dow=(di+6)%7;
                          const full=isDowFull(dow);
                          return (
                            <button key={di} onClick={()=>toggleDowWithRepeat(dow)}
                              style={{flex:1,padding:"4px 0",fontSize:11,fontWeight:700,borderRadius:5,border:`1.5px solid ${full?bc:T.border}`,background:full?bc:T.bgCard,color:full?"#fff":T.textMuted,cursor:"pointer",fontFamily:"inherit",transition:"all .12s"}}>
                              {dn}
                            </button>
                          );
                        })}
                      </div>
                    </>);
                  })()}
                  {/* 날짜 달력 그리드 (일요일 시작) */}
                  {(()=>{
                    // 이번달 날짜만 (isNext 제외)
                    const thisDays = days; // isNext(이월 주) 포함
                    // 1일의 일요일 기준 오프셋 (일=0, 월=1, ... 토=6)
                    const firstDowSun = (getDow0Mon(year,month,1)+1)%7;
                    // 빈칸 + 날짜 배열
                    const cells = [];
                    for(let i=0;i<firstDowSun;i++) cells.push(null);
                    thisDays.forEach(d=>cells.push(d));
                    // 7의 배수로 맞춤
                    while(cells.length%7!==0) cells.push(null);
                    return (
                      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
                        {cells.map((day,ci)=>{
                          if(!day) return <div key={"e"+ci} style={{height:30}}/>;
                          const key=emp.id+"__"+day.ds;
                          // ownerReqs 직접 지정 OR ownerRepeat 반복 요일에 해당하면 on
                          const _rep = ownerRepeat[emp.id] || {enabled:false, dows:[]};
                          const on=!!ownerReqs[key] || (_rep.enabled && _rep.dows.includes(day.dow));
                          const isSun=day.dow===6; const isSat=day.dow===5;
                          return (
                            <div key={day.ds}
                              onMouseDown={e=>{
                                e.preventDefault();
                                const dr=ownerDragRef.current;
                                dr.active=true; dr.empId=emp.id;
                                dr.mode=ownerReqs[key]?'off':'on';
                                setOwnerReqs(p=>{ if(p[key]){const n={...p};delete n[key];return n;}return{...p,[key]:STATUS.MUST_OFF};});
                              }}
                              onMouseEnter={()=>{
                                const dr=ownerDragRef.current;
                                if(!dr.active||dr.empId!==emp.id) return;
                                setOwnerReqs(p=>{
                                  if(dr.mode==='on') return p[key]?p:{...p,[key]:STATUS.MUST_OFF};
                                  if(dr.mode==='off'){ if(!p[key]) return p; const n={...p};delete n[key];return n; }
                                  return p;
                                });
                              }}
                              style={{height:30,borderRadius:5,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:11,fontWeight:700,background:on?bc:day.isNext?"#ede8f5":"#f5f0ea",color:on?"#fff":day.isNext?T.purple:isSun?T.danger:isSat?T.primary:T.textSub,border:`1.5px solid ${on?bc:day.isNext?"#c4b3e0":T.border}`,transition:"all .12s",userSelect:"none",opacity:day.isNext?0.85:1}}>
                              <div style={{fontSize:11,lineHeight:1}}>{day.d}</div>
                              {day.isNext&&<div style={{fontSize:7,lineHeight:1,marginTop:1}}>{(month+2>12?1:month+2)}월</div>}
                            </div>
                          );
                        })}
                      </div>
                    );
                  })()}
                  <div style={{marginTop:8,fontSize:11,color:"#b0a090"}}>지정: {myReqs.filter(([k])=>k.includes("__"+curMonthStr)||k.includes("__"+nextMonthStr)).length}일</div>
                </div>
              );
            })}
          </div>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

const stickyCol = { position:"sticky",left:0,zIndex:10,width:170,minWidth:170,padding:"6px 10px",verticalAlign:"middle",background:T.bgCard,boxShadow:"2px 0 4px rgba(0,0,0,.07)" };
const navBtn = { background:"none",border:"1px solid #e4ddd0",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:13,fontFamily:"inherit",color:T.textSub };

function Btn({label,onClick,primary,outline,danger,style={}}){
  const bg=primary?T.primary:danger?T.danger:outline?T.bgCard:T.gray200;
  const col=primary?"#fff":danger?"#fff":outline?T.textSub:T.text;
  const brd=outline?"1px solid "+T.border:"none";
  return (
    <button onClick={onClick} style={{background:bg,color:col,border:brd,borderRadius:T.radius.md,
      padding:"7px 13px",fontSize:T.fs.xs,cursor:"pointer",fontFamily:"inherit",fontWeight:T.fw.bold,
      display:"inline-flex",alignItems:"center",gap:5,transition:"all .15s",whiteSpace:"nowrap",
      boxShadow:primary?"0 1px 4px rgba(124,124,200,.3)":"none",...style}}
      onMouseEnter={e=>{e.currentTarget.style.filter="brightness(.93)";e.currentTarget.style.transform="translateY(-1px)";}}
      onMouseLeave={e=>{e.currentTarget.style.filter="";e.currentTarget.style.transform="";}}>
      {label}
    </button>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
